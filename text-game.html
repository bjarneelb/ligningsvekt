<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Smarte Revs Matteløp</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        #game-container { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .setup-section { margin-top: 50px; padding: 15px; border-top: 2px dashed #ccc; font-size: 0.9em; color: #666; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background: #45a049; }
        #question { font-size: 24px; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🦊 Smarte Revs Matteløp</h1>
    <div id="start-screen">
        <p>Trykk på knappen for å starte løpet!</p>
        <button onclick="startGame()">Start Spill</button>
    </div>

    <div id="game-screen" style="display:none;">
        <p id="car-name-display"></p>
        <div id="question">Laster oppgave...</div>
        <input type="number" id="answerInput" placeholder="Svar her">
        <button onclick="checkAnswer()">Sjekk svar</button>
    </div>
</div>

<!-- Denne seksjonen holder nøkkelen din trygg og lokalt lagret -->
<div class="setup-section">
    <h3>⚙️ API-Innstillinger</h3>
    <p>Lim inn din API-nøkkel her (den lagres kun i din nettleser):</p>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
    <button onclick="saveApiKey()" style="background: #2196F3;">Lagre nøkkel</button>
    <p id="keyStatus"></p>
</div>

<script type="module">
    import { generateEquationTask, generateCarName } from './js/gemini-api.js';

    let currentX = 0;

    window.saveApiKey = function() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key.startsWith("AIza")) {
            localStorage.setItem("gemini_api_key", key);
            document.getElementById('keyStatus').innerText = "✅ Nøkkel lagret!";
            document.getElementById('keyStatus').style.color = "green";
        } else {
            alert("Ugyldig nøkkel-format. Den skal starte med AIza.");
        }
    };

    window.startGame = async function() {
        const key = localStorage.getItem("gemini_api_key");
        if (!key) {
            alert("Du må lagre en API-nøkkel nederst på siden først!");
            return;
        }

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        const carName = await generateCarName();
        document.getElementById('car-name-display').innerText = "Din bil: 🏎️ " + carName;
        
        loadNewTask();
    };

    async function loadNewTask() {
        document.getElementById('question').innerText = "Henter ny oppgave...";
        const task = await generateEquationTask(1);
        
        if (task) {
            document.getElementById('question').innerText = task.oppgaveTekst;
            currentX = task.xVerdi;
        } else {
            document.getElementById('question').innerText = "Kunne ikke hente oppgave. Sjekk nøkkelen.";
        }
    }

    window.checkAnswer = function() {
        const userAnswer = parseInt(document.getElementById('answerInput').value);
        if (userAnswer === currentX) {
            alert("Riktig! 🎉");
            document.getElementById('answerInput').value = "";
            loadNewTask();
        } else {
            alert("Feil, prøv igjen! 🦊");
        }
    };
</script>

</body>
</html>
