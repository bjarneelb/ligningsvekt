<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Smarte Revs Matteløp</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 20px; }
        #game-container { background: #333; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 15px; border: 2px solid #4CAF50; }
        #track { background: #444; height: 80px; position: relative; margin: 20px 0; border-radius: 5px; }
        #car { position: absolute; left: 0; top: 15px; font-size: 40px; transition: left 0.5s; }
        .hidden { display: none; }
        input { padding: 10px; font-size: 18px; width: 80px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        .setup { margin-top: 40px; padding: 15px; background: #111; border-radius: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🦊 Smarte Revs Matteløp</h1>
    
    <div id="start-screen">
        <button onclick="startGame()">START SPILLET 🏁</button>
    </div>

    <div id="game-screen" class="hidden">
        <p id="car-name-display">🏎️ Bil: Laster...</p>
        <div id="track"><div id="car">🏎️</div></div>
        <div id="question">Laster oppgave...</div>
        <br>
        <input type="number" id="answerInput" placeholder="Svar">
        <button onclick="checkAnswer()">SVAR</button>
    </div>

    <div id="win-screen" class="hidden">
        <h2>🎉 DU VANT! 🎉</h2>
        <button onclick="location.reload()">Spill igjen</button>
    </div>
</div>

<div class="setup">
    <h3>⚙️ Innstillinger</h3>
    <input type="password" id="apiKeyInput" placeholder="Lim inn API-nøkkel">
    <button onclick="saveApiKey()">Lagre Nøkkel</button>
</div>

<script type="module">
    import { generateEquationTask, generateCarName } from './js/gemini-api.js';

    let currentX = 0;
    let progress = 0;

    // Vi gjør funksjonene tilgjengelige for knappene (globale)
    window.saveApiKey = function() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key.startsWith("AIza")) {
            localStorage.setItem("gemini_api_key", key);
            alert("Nøkkel lagret lokalt!");
        } else {
            alert("Ugyldig nøkkel!");
        }
    };

    window.startGame = async function() {
        const key = localStorage.getItem("gemini_api_key");
        if (!key) return alert("Legg inn nøkkel nederst først!");

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        const carName = await generateCarName();
        document.getElementById('car-name-display').innerText = "🏎️ Bil: " + carName;
        loadNewTask();
    };

    async function loadNewTask() {
        const task = await generateEquationTask(1);
        if (task) {
            document.getElementById('question').innerText = task.oppgaveTekst;
            currentX = task.xVerdi;
            document.getElementById('answerInput').value = "";
        }
    }

    window.checkAnswer = function() {
        const ans = parseInt(document.getElementById('answerInput').value);
        if (ans === currentX) {
            progress += 25;
            document.getElementById('car').style.left = progress + "%";
            if (progress >= 100) {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('win-screen').classList.remove('hidden');
            } else {
                loadNewTask();
            }
        } else {
            alert("Feil! 🦊");
        }
    };
</script>

</body>
</html>
