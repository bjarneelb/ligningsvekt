<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Grand Prix</title>
    <style>
        :root { --track-grey: #2c3e50; --line-yellow: #f1c40f; --grass-green: #27ae60; }
        body { margin: 0; padding: 0; background: var(--grass-green); font-family: sans-serif; overflow: hidden; color: white; }
        .race-header { background: rgba(0, 0, 0, 0.8); padding: 15px; text-align: center; border-bottom: 5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #roomDisplay { font-size: 2rem; font-weight: bold; color: var(--line-yellow); margin-left: 20px; }
        .track-container { position: relative; width: 100%; height: 85vh; background: var(--track-grey); border-top: 10px solid #555; border-bottom: 10px solid #555; }
        .road-lines { position: absolute; top: 50%; width: 100%; height: 10px; border-top: 5px dashed white; opacity: 0.3; transform: translateY(-50%); }
        .finish-line { position: absolute; right: 50px; top: 0; width: 30px; height: 100%; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .car-container { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; transition: left 1s ease-out; z-index: 10; }
        .car-sprite { width: 80px; height: 40px; border-radius: 5px; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .car-sprite::after { content: ''; position: absolute; right: 10px; top: 5px; width: 20px; height: 30px; background: rgba(255,255,255,0.3); border-radius: 3px; }
        .car-label { background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 5px; white-space: nowrap; }
        .score-bubble { font-size: 0.7rem; color: var(--line-yellow); }
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .setup-box { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; }
        input { padding: 10px; font-size: 1.2rem; width: 200px; text-align: center; margin: 10px; }
    </style>
</head>
<body>
    <div id="setup" class="setup-overlay">
        <div class="setup-box">
            <h1>Grand Prix Oppsett</h1>
            <input type="text" id="roomInput" placeholder="ROMKODE"><br>
            <input type="number" id="goalInput" value="5000" placeholder="MÅLSUM"><br>
            <button onclick="startRace()" style="padding:15px 30px; background:#27ae60; color:white; border:none; border-radius:10px; cursor:pointer;">START RACE</button>
        </div>
    </div>

    <div class="race-header">
        <div id="roomDisplay">KODE: ---</div>
        <div id="leaderboard">Venter...</div>
    </div>

    <div class="track-container" id="track">
        <div class="road-lines"></div>
        <div class="finish-line"></div>
    </div>

    <script type="module">
        import { database, ref, onValue } from "./js/firebase-config.js";

        let goalPoints = 5000;
        let cars = {};

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            if (room) {
                document.getElementById("roomInput").value = room.toUpperCase();
                startRace();
            }
        };

        window.startRace = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            goalPoints = parseInt(document.getElementById("goalInput").value) || 5000;
            if(!room) return;

            document.getElementById("setup").style.display = "none";
            document.getElementById("roomDisplay").innerText = "ROM: " + room;

            onValue(ref(database, `rooms/${room}/players`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                const now = Date.now();

                Object.keys(data).forEach((name, index) => {
                    const p = data[name];
                    if (now - p.lastUpdated > 600000) {
                        if(cars[name]) { track.removeChild(cars[name].el); delete cars[name]; }
                        return;
                    }

                    if (!cars[name]) {
                        const div = document.createElement("div");
                        div.className = "car-container";
                        div.style.top = (15 + (index * 60) % (track.offsetHeight - 100)) + "px";
                        div.innerHTML = `<div class="car-label">${name}</div><div class="car-sprite"></div><div class="score-bubble">0</div>`;
                        document.getElementById("track").appendChild(div);
                        const hue = name.split('').reduce((a,b) => a + b.charCodeAt(0), 0) % 360;
                        div.querySelector(".car-sprite").style.backgroundColor = `hsl(${hue}, 70%, 50%)`;
                        cars[name] = { el: div };
                    }

                    const progress = Math.min((p.score / goalPoints) * 85, 90);
                    cars[name].el.style.left = progress + "%";
                    cars[name].el.querySelector(".score-bubble").innerText = p.score + " P";
                });
            });
        };
    </script>
</body>
</html>
