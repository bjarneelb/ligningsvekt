<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Grand Prix</title>
    <style>
        :root {
            --track-grey: #2c3e50;
            --line-yellow: #f1c40f;
            --grass-green: #27ae60;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--grass-green);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Header / Dashboard info */
        .race-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            text-align: center;
            border-bottom: 5px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #roomDisplay { font-size: 2rem; font-weight: bold; color: var(--line-yellow); margin-left: 20px; }

        /* Banen */
        .track-container {
            position: relative;
            width: 100%;
            height: 85vh;
            background: var(--track-grey);
            border-top: 10px solid #555;
            border-bottom: 10px solid #555;
            overflow: hidden;
        }

        /* Animerte veistriper */
        .road-lines {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 10px;
            border-top: 5px dashed white;
            opacity: 0.3;
            transform: translateY(-50%);
        }

        /* Målstrek */
        .finish-line {
            position: absolute;
            right: 50px;
            top: 0;
            width: 30px;
            height: 100%;
            background-color: white;
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* Bil-styling */
        .car-container {
            position: absolute;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 1s cubic-bezier(0.25, 0.1, 0.25, 1); /* Myke bevegelser */
            z-index: 10;
        }

        .car-sprite {
            width: 80px;
            height: 40px;
            background: #e74c3c;
            border-radius: 5px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* Lager vindu på bilen */
        .car-sprite::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 5px;
            width: 20px;
            height: 30px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .car-label {
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
        }

        .score-bubble {
            font-size: 0.7rem;
            color: var(--line-yellow);
        }
    </style>
</head>
<body>

    <div class="race-header">
        <div>LIGNINGSLØPET GRAND PRIX</div>
        <div id="roomDisplay">KODE: ---</div>
        <div id="leaderboard" style="font-size: 0.8rem; text-align: right; margin-right: 20px;">
            Venter på biler...
        </div>
    </div>

    <div class="track-container" id="track">
        <div class="road-lines"></div>
        <div class="finish-line"></div>
        <!-- Her dukker bilene opp -->
    </div>

    <script type="module">
        import { database, ref, onValue } from "./js/firebase-config.js";

        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room')?.toUpperCase() || "DEMO";
        document.getElementById("roomDisplay").innerText = "KODE: " + roomCode;

        const track = document.getElementById("track");
        const playersRef = ref(database, `rooms/${roomCode}/players`);
        
        let cars = {}; // Holder styr på DOM-elementene til hver bil

        onValue(playersRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const now = Date.now();
            const playerNames = Object.keys(data);

            playerNames.forEach((name, index) => {
                const playerData = data[name];
                
                // 1. FJERN INAKTIVE BILER (over 10 min siden sist aktivitet)
                if (now - playerData.lastUpdated > 600000) {
                    if (cars[name]) {
                        track.removeChild(cars[name].element);
                        delete cars[name];
                    }
                    return;
                }

                // 2. OPPRETT BIL HVIS DEN IKKE FINNES
                if (!cars[name]) {
                    const carElement = document.createElement("div");
                    carElement.className = "car-container";
                    
                    // Fordel biler vertikalt på banen
                    const laneY = 50 + (index * 60) % (track.offsetHeight - 100);
                    carElement.style.top = laneY + "px";

                    carElement.innerHTML = `
                        <div class="car-label">${name}</div>
                        <div class="car-sprite"></div>
                        <div class="score-bubble">0 poeng</div>
                    `;
                    
                    track.appendChild(carElement);
                    cars[name] = { 
                        element: carElement,
                        lastScore: 0
                    };
                }

                // 3. OPPDATER POSISJON
                // Vi beregner posisjon basert på poengsum. 
                // La oss si at 5000 poeng er "mål".
                const maxPoints = 5000; 
                const progress = Math.min((playerData.score / maxPoints) * 85, 90); // Max 90% av skjermbredden
                
                cars[name].element.style.left = progress + "%";
                cars[name].element.querySelector(".score-bubble").innerText = playerData.score + " poeng";
                
                // Gi bilen en farge basert på navnet (hash) så den er unik
                const hue = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % 360;
                cars[name].element.querySelector(".car-sprite").style.backgroundColor = `hsl(${hue}, 70%, 50%)`;
            });

            oppdaterLeaderboard(data);
        });

        function oppdaterLeaderboard(data) {
            const sorted = Object.entries(data)
                .sort((a, b) => b[1].score - a[1].score)
                .slice(0, 5);
            
            let html = "<strong>TOPP 5:</strong><br>";
            sorted.forEach(([name, d], i) => {
                html += `${i+1}. ${name} (${d.score})<br>`;
            });
            document.getElementById("leaderboard").innerHTML = html;
        }
    </script>
</body>
</html>
