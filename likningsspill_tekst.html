<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likningsbyggeren – Kappløpet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --panel: #ffffff;
    --border: #d0d8f0;
    --accent: #5b4fcf;
    --accent2: #e84393;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
    --blue: #3b82f6;
    --yellow: #eab308;
    --text: #1e1b4b;
    --muted: #6b7280;
    --x-color: #7c3aed;
    --x-neg-color: #be185d;
    --num-pos-color: #1d4ed8;
    --num-neg-color: #b45309;
    --shadow: 0 4px 24px rgba(91,79,207,0.10);
    --r: 16px;
    --r-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(91,79,207,0.25);
  }
  .header-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
  .player-badge {
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 5px 14px;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .streak-badge {
    background: var(--yellow);
    color: #713f12;
    border-radius: 20px;
    padding: 5px 14px;
    font-weight: 800;
    font-size: 0.9rem;
  }

  /* ── START SCREEN ── */
  #startScreen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #4338ca 0%, #7c3aed 60%, #e84393 100%);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .start-card {
    background: white;
    border-radius: 28px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .start-car { font-size: 4rem; margin-bottom: 8px; }
  .start-card h1 { font-size: 2rem; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
  .start-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 20px; }
  .start-name { font-weight: 800; font-size: 1.1rem; color: var(--accent2); background: #fdf2f8; border-radius: 10px; padding: 8px 16px; display: inline-block; margin-bottom: 20px; }
  .start-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    outline: none;
  }
  .start-input:focus { border-color: var(--accent); }
  .btn-start {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }
  .btn-start:hover { background: #4338ca; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* ── MAIN LAYOUT ── */
  .main {
    width: 100%;
    max-width: 900px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── STORY CARD ── */
  .story-card {
    background: white;
    border-radius: var(--r);
    padding: 20px 24px;
    border: 2px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .story-icon { font-size: 2.5rem; flex-shrink: 0; margin-top: 2px; }
  .story-text h2 { font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .story-text p { font-size: 1.05rem; line-height: 1.6; color: var(--text); }
  .story-hint { font-size: 0.85rem; color: var(--muted); margin-top: 8px; font-style: italic; }
  .loading-text { color: var(--muted); font-style: italic; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── EQUATION DISPLAY ── */
  .equation-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 1.5rem;
    font-weight: 900;
    font-family: 'Nunito', monospace;
    color: var(--accent);
    min-height: 48px;
  }
  .eq-equals { color: var(--muted); }

  /* ── SCALES ── */
  .scales-area {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .scale-panel {
    flex: 1;
    background: white;
    border-radius: var(--r);
    border: 2px solid var(--border);
    padding: 16px;
    min-height: 180px;
    box-shadow: var(--shadow);
    position: relative;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1), border-color 0.3s;
  }
  .scale-panel.drag-over { border-color: var(--accent); background: #f5f3ff; }
  .scale-label {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .blocks-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 80px;
    align-content: flex-start;
  }
  .scale-eq-sign {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 900;
    color: var(--muted);
    padding: 60px 0;
    flex-shrink: 0;
    width: 32px;
  }

  /* ── BLOCKS ── */
  .block {
    padding: 10px 14px;
    border-radius: var(--r-sm);
    font-weight: 800;
    font-size: 1rem;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    border: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    text-align: center;
  }
  .block:active { cursor: grabbing; transform: scale(1.08); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  .block.type-x      { background: var(--x-color); }
  .block.type-x-neg  { background: var(--x-neg-color); }
  .block.type-num    { background: var(--num-pos-color); }
  .block.type-num-neg{ background: var(--num-neg-color); }
  .block.dragging    { opacity: 0.4; }
  .block.just-changed { animation: pop 0.5s ease-out; }
  @keyframes pop {
    0%   { transform: scale(1.2); box-shadow: 0 0 0 4px rgba(91,79,207,0.5); }
    100% { transform: scale(1);   box-shadow: none; }
  }

  /* ── BLOCK BANK ── */
  .block-bank {
    background: white;
    border-radius: var(--r);
    border: 2px dashed var(--border);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .block-bank-label {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .bank-blocks { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; }

  /* ── OPERATIONS PANEL ── */
  .ops-panel {
    background: white;
    border-radius: var(--r);
    border: 2px solid var(--border);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .ops-label {
    font-size: 0.8rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .ops-num-input {
    width: 64px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    outline: none;
  }
  .ops-num-input:focus { border-color: var(--accent); }
  .op-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .op-btn:active { transform: scale(0.96); }
  .op-btn.times { background: #ede9fe; color: var(--x-color); }
  .op-btn.divide { background: #dbeafe; color: var(--num-pos-color); }
  .op-btn:hover { filter: brightness(0.94); }

  /* ── ACTION BUTTONS ── */
  .actions-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    min-width: 100px;
  }
  .action-btn:hover { filter: brightness(0.93); transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }
  .btn-check  { background: var(--green);  color: white; }
  .btn-reset  { background: #fef3c7; color: #92400e; }
  .btn-new    { background: #f0f4ff; color: var(--accent); border: 2px solid var(--border); }

  /* ── FEEDBACK TOAST ── */
  .feedback-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 1.1rem;
    color: white;
    z-index: 500;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .feedback-toast.show { transform: translateX(-50%) translateY(0); }
  .feedback-toast.success { background: var(--green); }
  .feedback-toast.error   { background: var(--red); }

  /* ── SCOREBOARD ── */
  .score-card {
    background: white;
    border-radius: var(--r);
    border: 2px solid var(--border);
    padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .score-title {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .score-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .score-entry:last-child { border-bottom: none; }
  .score-entry.is-me { color: var(--accent); }
  .score-entry .pos { color: var(--muted); width: 20px; }
  .score-entry .pts { background: #f0f4ff; color: var(--accent); border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; }
  .score-entry.is-me .pts { background: var(--accent); color: white; }

  /* ── LEVEL BADGE ── */
  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-radius: 20px;
    padding: 4px 14px;
    font-weight: 800;
    font-size: 0.85rem;
  }

  /* ── CONTEXT MENU ── */
  .ctx-menu {
    display: none;
    position: fixed;
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 2000;
    overflow: hidden;
  }
  .ctx-menu button {
    display: block;
    width: 100%;
    border: none;
    background: none;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
  }
  .ctx-menu button:hover { background: #f5f3ff; color: var(--accent); }

  /* ── TIMER BAR ── */
  .timer-bar-wrap {
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow), var(--red));
    border-radius: 3px;
    transition: width 0.5s linear;
  }

  /* ── BOTTOM ROW ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 16px;
    align-items: start;
  }

  @media (max-width: 640px) {
    .bottom-row { grid-template-columns: 1fr; }
    .scales-area { flex-direction: column; }
    .scale-eq-sign { padding: 8px 0; width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- FEEDBACK TOAST -->
<div class="feedback-toast" id="toast"></div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu">
  <button onclick="ctxInvert()">± Bytt fortegn</button>
  <button onclick="ctxSplit()">⚏ Splitt blokk</button>
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="start-card">
    <div class="start-car">🏎️</div>
    <h1>Likningsbyggeren</h1>
    <p>Løs tekstoppgaver – bygg likninger – vinn løpet!</p>
    <div class="start-name" id="displayName">...</div>
    <input class="start-input" id="roomInput" placeholder="ROMKODE" maxlength="8">
    <button class="btn-start" onclick="startGame()">Start motoren! 🚦</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-title">🏎️ Likningsbyggeren</div>
  <div class="header-right">
    <span class="player-badge" id="headerName">–</span>
    <span class="streak-badge">🔥 <span id="streakCount">0</span></span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STORY CARD -->
  <div class="story-card">
    <div class="story-icon" id="storyIcon">🤔</div>
    <div class="story-text" style="flex:1">
      <h2>Tekstoppgave <span id="levelBadge" class="level-badge">Nivå 1</span></h2>
      <p id="storyText"><span class="loading-text">Henter oppgave fra KI...</span></p>
      <div class="timer-bar-wrap" style="margin-top:10px"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
      <p class="story-hint" id="storyHint"></p>
    </div>
  </div>

  <!-- EQUATION MIRROR -->
  <div class="equation-row">
    <span id="eqLeft">–</span>
    <span class="eq-equals">=</span>
    <span id="eqRight">–</span>
  </div>

  <!-- SCALES -->
  <div class="scales-area">
    <div class="scale-panel" id="scaleL" ondragover="ev.preventDefault()" ondrop="handleDrop(event,'left')">
      <div class="scale-label">Venstre side</div>
      <div class="blocks-container" id="blocksL"></div>
    </div>
    <div class="scale-eq-sign">=</div>
    <div class="scale-panel" id="scaleR" ondragover="ev.preventDefault()" ondrop="handleDrop(event,'right')">
      <div class="scale-label">Høyre side</div>
      <div class="blocks-container" id="blocksR"></div>
    </div>
  </div>

  <!-- BLOCK BANK -->
  <div class="block-bank" id="bankPanel" ondragover="event.preventDefault()" ondrop="handleDrop(event,'bank')">
    <div class="block-bank-label">📦 Blokker – dra dem inn på sidene</div>
    <div class="bank-blocks" id="bankBlocks"></div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bottom-row">
    <div style="display:flex; flex-direction:column; gap:12px">

      <!-- OPS PANEL -->
      <div class="ops-panel">
        <span class="ops-label">Gjør noe med BEGGE sider:</span>
        <input class="ops-num-input" id="opVal" type="number" value="2" min="1" max="100">
        <button class="op-btn times"  onclick="operate('multiply')">× Ganger</button>
        <button class="op-btn divide" onclick="operate('divide')">÷ Del</button>
      </div>

      <!-- ACTIONS -->
      <div class="actions-row">
        <button class="action-btn btn-check" onclick="checkSolution()">✅ Sjekk svar</button>
        <button class="action-btn btn-reset" onclick="resetTask()">↺ Nullstill</button>
        <button class="action-btn btn-new"   onclick="initGame()">⏭️ Ny oppgave</button>
      </div>
    </div>

    <!-- SCOREBOARD -->
    <div class="score-card">
      <div class="score-title">🏆 Toppliste</div>
      <div id="scoreList"><div style="color:var(--muted); font-size:0.85rem">Venter på spillere...</div></div>
    </div>
  </div>

</div><!-- /main -->

<!-- FIREBASE MODULE SCRIPT -->
<script type="module">
  import { database, ref, set, update, onValue } from "./js/firebase-config.js";
  window._fbReady = true;
  window._db = database;
  window._ref = ref;
  window._set = set;
  window._update = update;
  window._onValue = onValue;

  window.startGame = function() {
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!room) { alert('Skriv inn romkode!'); return; }
    window.roomCode = room;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('headerName').textContent = window.playerName;

    _set(_ref(_db, 'rooms/' + room + '/players/' + window.playerName), {
      score: 0, lastUpdated: Date.now()
    });

    _onValue(_ref(_db, 'rooms/' + room + '/players'), (snap) => {
      const players = snap.val();
      if (players) updateScoreboard(players);
    });

    initGame();
  };

  window.syncScore = function(score) {
    if (!window.roomCode) return;
    _update(_ref(_db, 'rooms/' + window.roomCode + '/players/' + window.playerName), {
      score: score, lastUpdated: Date.now()
    });
  };

  function updateScoreboard(players) {
    const sorted = Object.entries(players)
      .sort((a, b) => b[1].score - a[1].score)
      .slice(0, 6);
    let html = '';
    sorted.forEach(([name, data], i) => {
      const isMe = name === window.playerName;
      const medals = ['🥇','🥈','🥉'];
      const pos = medals[i] || (i + 1) + '.';
      html += `<div class="score-entry ${isMe ? 'is-me' : ''}">
        <span class="pos">${pos}</span>
        <span style="flex:1; padding:0 8px">${name.split(' ')[1] || name}</span>
        <span class="pts">${data.score} p</span>
      </div>`;
    });
    document.getElementById('scoreList').innerHTML = html || '<div style="color:var(--muted); font-size:0.85rem">Ingen spillere ennå</div>';
  }
</script>

<!-- MAIN GAME SCRIPT -->
<script>
// ─── PLAYER NAME ───
const adj = ['Raske','Lynraske','Smarte','Ville','Smidige','Modige','Gylne','Flinke'];
const ani = ['Gaupe','Rev','Bjørn','Ulv','Hauk','Ugle','Løve','Tiger'];
window.playerName = adj[Math.floor(Math.random()*adj.length)] + ' ' + ani[Math.floor(Math.random()*ani.length)];
document.getElementById('displayName').textContent = '🚗 ' + window.playerName;

// ─── STATE ───
let sides = { left: [], right: [], bank: [] };
let xValue = 0, idCounter = 0, winStreak = 0;
let activeMenuTarget = null, lastChangedId = null;
let originalTask = null;
let timerInterval = null, timerSeconds = 0, maxSeconds = 90;
let currentScore = 0;

const icons = ['🐱','🐶','🦊','🐻','🐼','🦁','🐸','🐧','🦋','⚽','🎮','🍕','🚂','✈️','🌈','🎯'];

// ─── INIT GAME ───
async function initGame() {
  clearTimer();
  sides = { left: [], right: [], bank: [] };
  lastChangedId = null;
  renderAll();

  document.getElementById('storyText').innerHTML = '<span class="loading-text">Henter oppgave fra KI... 🤖</span>';
  document.getElementById('storyHint').textContent = '';

  const level = winStreak >= 9 ? 4 : winStreak >= 6 ? 3 : winStreak >= 3 ? 2 : 1;
  document.getElementById('levelBadge').textContent = 'Nivå ' + level;
  document.getElementById('storyIcon').textContent = icons[Math.floor(Math.random()*icons.length)];

  try {
    const task = await fetchAITask(level);
    applyTask(task);
    startTimer();
  } catch(e) {
    console.warn('AI feilet, bruker fallback:', e);
    applyTask(generateFallback(level));
    startTimer();
  }
}
window.initGame = initGame;

// ─── FETCH AI TASK ───
async function fetchAITask(level) {
  const levelDescriptions = {
    1: 'x + b = c (én ukjent, addisjon). Eks: Kari er 5 år eldre enn Ola, til sammen er de 25 år. Svar: x = alder til Ola.',
    2: 'a·x = c (multiplikasjon). Eks: Tre like pakker veier 18 kg.',
    3: 'a·x + b = c (multiplikasjon og addisjon). Eks: Prisen for en billett er 3 ganger barnebilletten pluss 20 kr, voksenbilletten koster 110 kr.',
    4: 'a·x + b = c·x + d (ukjente på begge sider). Eks: To venner sparer penger på ulike måter, etter N uker har de like mye.'
  };

  const prompt = `Du er en matematikklærer som lager norske tekstoppgaver til ungdomsskoleelever (${level}. trinn).
Lag ÉN morsom og engasjerende tekstoppgave som leder til en likning av typen: ${levelDescriptions[level]}

Svar KUN med gyldig JSON på dette formatet (ingen markdown, ingen forklaring):
{

  "hint": "Hva betyr x i denne oppgaven? (1 setning)",
  "equation": {

}
Regler for equation:
- type "x" betyr antall·x (num er koeffisienten, kan være negativ)
- type "num" betyr et tall (num er verdien, kan være negativ)
- xValue er den korrekte løsningen (heltall mellom 2 og 20)
- Likningen MÅ stemme: sum av venstre side med x=xValue = sum av høyre side
- Nivå ${level} spesifikt: ${level===4 ? 'BRUK x-blokker på BEGGE sider' : 'Bruk KUN x-blokker på VENSTRE side'}
- Tall-blokker med num=0 er IKKE tillatt`;

  const res = await fetch('/.netlify/functions/ai-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
  });

  if (!res.ok) throw new Error('API feil: ' + res.status);
  const data = await res.json();
  const text = data.content[0].text.trim();
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);

// ─── FALLBACK TASKS ───
function generateFallback(level) {
  xValue = Math.floor(Math.random() * 7) + 3;
  const fallbacks = {
    1: () => {
      const b = Math.floor(Math.random()*8)+2;
      return {
        story: `Kari er ${b} år eldre enn Ola. Til sammen er de ${xValue + b + xValue} år. Hvor gammel er Ola?`,
        hint: 'La x = Olas alder',
        equation: {
          left: [{type:'x',num:1},{type:'num',num:b},{type:'x',num:1}],
          right: [{type:'num',num:xValue+b+xValue}],
          xValue
        }
      };
    },
    2: () => {
      const a = Math.floor(Math.random()*3)+2;
      return {
        story: `${a} like bøker koster til sammen ${a*xValue} kr. Hva koster én bok?`,
        hint: 'La x = prisen på én bok',
        equation: {
          left: [{type:'x',num:a}],
          right: [{type:'num',num:a*xValue}],
          xValue
        }
      };
    },
    3: () => {
      const a = Math.floor(Math.random()*3)+2;
      const b = Math.floor(Math.random()*8)+2;
      return {
        story: `${a} barn og ${b} voksne er ${a*xValue+b} personer til sammen. Hvor mange er barn?`,
        hint: 'La x = antall barn',
        equation: {
          left: [{type:'x',num:a},{type:'num',num:b}],
          right: [{type:'num',num:a*xValue+b}],
          xValue
        }
      };
    },
    4: () => {
      const c = Math.floor(Math.random()*2)+1;
      const a = c + Math.floor(Math.random()*2)+1;
      const d = Math.floor(Math.random()*8)+2;
      const b = (c*xValue+d)-(a*xValue);
      return {
        story: `Per sparer ${a}x + ${b} kr, Lise sparer ${c}x + ${d} kr. Etter x uker har de like mye. Finn x.`,
        hint: 'La x = antall uker',
        equation: {
          left: [{type:'x',num:a},{type:'num',num:b}],
          right: [{type:'x',num:c},{type:'num',num:d}],
          xValue
        }
      };
    }
  };
  return fallbacks[level]();
}

// ─── APPLY TASK ───
function applyTask(task) {
  xValue = task.equation.xValue;
  document.getElementById('storyText').textContent = task.story;
  document.getElementById('storyHint').textContent = '💡 ' + task.hint;

  // All blocks go to the bank initially
  const allBlocks = [
    ...task.equation.left.filter(b => b.num !== 0),
    ...task.equation.right.filter(b => b.num !== 0)
  ].map(b => ({id: idCounter++, type: b.type, num: b.num}));

  originalTask = {
    bank: JSON.parse(JSON.stringify(allBlocks)),
    left: [],
    right: [],
    x: xValue
  };
  resetTask();
}

// ─── RESET TASK ───
window.resetTask = function() {
  if (!originalTask) return;
  sides.bank = JSON.parse(JSON.stringify(originalTask.bank));
  sides.left = [];
  sides.right = [];
  xValue = originalTask.x;
  lastChangedId = null;
  renderAll();
};

// ─── RENDER ───
function renderAll() {
  renderSide('left',  document.getElementById('blocksL'));
  renderSide('right', document.getElementById('blocksR'));
  renderSide('bank',  document.getElementById('bankBlocks'));
  updateEquationDisplay();
  updateScaleTilt();
}

function renderSide(side, container) {
  container.innerHTML = '';
  sides[side].forEach(item => {
    const div = document.createElement('div');
    const typeClass = item.type === 'x'
      ? (item.num < 0 ? 'type-x-neg' : 'type-x')
      : (item.num < 0 ? 'type-num-neg' : 'type-num');
    const highlighted = item.id === lastChangedId ? 'just-changed' : '';
    div.className = `block ${typeClass} ${highlighted}`;
    div.draggable = true;
    div.setAttribute('data-id', item.id);
    div.setAttribute('data-side', side);
    if (item.type === 'x') {
      div.textContent = item.num === 1 ? 'x' : item.num === -1 ? '-x' : item.num + 'x';
    } else {
      div.textContent = item.num;
    }
    div.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text', JSON.stringify({side, id: item.id}));
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('contextmenu', e => {
      e.preventDefault();
      activeMenuTarget = {side, item};
      const m = document.getElementById('ctxMenu');
      m.style.display = 'block';
      m.style.left = e.clientX + 'px';
      m.style.top = e.clientY + 'px';
    });
    container.appendChild(div);
  });
}

function updateEquationDisplay() {
  document.getElementById('eqLeft').textContent = formatSide(sides.left);
  document.getElementById('eqRight').textContent = formatSide(sides.right);
}

function formatSide(items) {
  if (!items.length) return '–';
  return items.map((i, idx) => {
    let term = i.type === 'x'
      ? (i.num === 1 ? 'x' : i.num === -1 ? '-x' : i.num + 'x')
      : String(i.num);
    return (idx > 0 && i.num >= 0) ? '+ ' + term : term;
  }).join(' ');
}

function updateScaleTilt() {
  const val = s => sides[s].reduce((t, i) => t + (i.type === 'x' ? i.num * xValue : i.num), 0);
  const diff = val('left') - val('right');
  const tilt = Math.min(Math.max(diff * 4, -40), 40);
  document.getElementById('scaleL').style.transform = `translateY(${-tilt}px)`;
  document.getElementById('scaleR').style.transform = `translateY(${tilt}px)`;
}

// ─── DRAG & DROP ───
['scaleL','scaleR','bankPanel'].forEach((id, idx) => {
  const sideMap = ['left','right','bank'];
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    handleDrop(e, sideMap[idx]);
  });
});

window.handleDrop = function(ev, targetSide) {
  ev.preventDefault();
  let data;
  try { data = JSON.parse(ev.dataTransfer.getData('text')); } catch { return; }
  const srcArr = sides[data.side];
  const itemIdx = srcArr.findIndex(i => i.id === data.id);
  if (itemIdx === -1) return;
  const item = srcArr[itemIdx];

  // Try to merge with same-type block on same side (not bank)
  if (targetSide !== 'bank' && data.side === targetSide) {
    const targetEl = ev.target.closest('.block');
    if (targetEl) {
      const tid = parseInt(targetEl.getAttribute('data-id'));
      const tItem = sides[targetSide].find(i => i.id === tid);
      if (tItem && tItem.type === item.type && tItem.id !== item.id) {
        tItem.num += item.num;
        lastChangedId = tItem.id;
        srcArr.splice(itemIdx, 1);
        if (tItem.num === 0) {
          sides[targetSide].splice(sides[targetSide].indexOf(tItem), 1);
          lastChangedId = null;
        }
        renderAll();
        return;
      }
    }
  }

  // Move block
  lastChangedId = item.id;
  sides[targetSide].push(srcArr.splice(itemIdx, 1)[0]);
  renderAll();
};

// ─── OPERATIONS ───
window.operate = function(t) {
  const v = parseInt(document.getElementById('opVal').value);
  if (!v || v <= 0) return;
  lastChangedId = null;
  ['left','right'].forEach(s => {
    sides[s].forEach(i => {
      if (t === 'multiply') i.num *= v;
      else i.num = Math.round(i.num / v);
    });
    sides[s] = sides[s].filter(i => i.num !== 0);
  });
  renderAll();
};

// ─── CHECK SOLUTION ───
window.checkSolution = function() {
  const L = sides.left, R = sides.right;
  const isCorrect =
    L.length === 1 && L[0].type === 'x' && L[0].num === 1 &&
    R.length === 1 && R[0].type === 'num' && R[0].num === xValue &&
    sides.bank.length === 0;

  if (isCorrect) {
    clearTimer();
    winStreak++;
    const bonus = Math.max(10, Math.round((timerSeconds / maxSeconds) * 100));
    currentScore += bonus;
    document.getElementById('streakCount').textContent = winStreak;
    if (typeof syncScore === 'function') syncScore(currentScore);
    showToast('🎉 Riktig! +' + bonus + ' poeng!', 'success');
    setTimeout(() => initGame(), 1800);
  } else {
    showToast('❌ Ikke løst ennå – prøv igjen!', 'error');
  }
};

// ─── CONTEXT MENU ───
window.ctxInvert = function() {
  if (!activeMenuTarget) return;
  activeMenuTarget.item.num *= -1;
  lastChangedId = activeMenuTarget.item.id;
  renderAll();
};
window.ctxSplit = function() {
  if (!activeMenuTarget || Math.abs(activeMenuTarget.item.num) < 2) return;
  const i = activeMenuTarget.item;
  const n1 = Math.floor(i.num / 2), n2 = i.num - n1;
  const sideArr = sides[activeMenuTarget.side];
  sideArr.splice(sideArr.indexOf(i), 1);
  const newId = idCounter++;
  sideArr.push({id: newId, type: i.type, num: n1}, {id: idCounter++, type: i.type, num: n2});
  lastChangedId = newId;
  renderAll();
};
document.addEventListener('click', () => document.getElementById('ctxMenu').style.display = 'none');

// ─── TIMER ───
function startTimer() {
  timerSeconds = maxSeconds;
  updateTimerBar();
  timerInterval = setInterval(() => {
    timerSeconds = Math.max(0, timerSeconds - 1);
    updateTimerBar();
    if (timerSeconds === 0) {
      clearTimer();
      showToast('⏱️ Tiden er ute!', 'error');
    }
  }, 1000);
}
function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function updateTimerBar() {
  const pct = (timerSeconds / maxSeconds) * 100;
  document.getElementById('timerBar').style.width = pct + '%';
}

// ─── TOAST ───
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'feedback-toast ' + type;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── STARTUP (no Firebase – demo mode) ───
window.addEventListener('load', () => {
  // Show game immediately if no Firebase setup
  if (!window._fbReady) {
    window.startGame = function() {
      const room = document.getElementById('roomInput').value.trim().toUpperCase();
      if (!room) { alert('Skriv inn romkode!'); return; }
      window.roomCode = room;
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('headerName').textContent = window.playerName;
      window.syncScore = () => {};
      initGame();
    };
  }
});
