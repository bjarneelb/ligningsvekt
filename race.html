<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Storskjerm</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        
        /* Topplinje */
        .header { text-align: center; padding: 15px; background: linear-gradient(to bottom, #333, #1a1a1a); border-bottom: 3px solid #f1c40f; }
        h1 { margin: 0; color: #f1c40f; text-transform: uppercase; letter-spacing: 3px; font-size: 2.5rem; }
        
        /* Racebanen */
        .track-container { 
            position: relative; 
            width: 98vw; 
            height: 85vh; 
            margin: 10px auto; 
            background: #333; 
            border: 8px solid #555; 
            border-radius: 20px;
            box-sizing: border-box;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100px 100px;
        }
        
        /* Markeringsskilt for poeng */
        .markers {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
            box-sizing: border-box;
            color: #f1c40f;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            z-index: 2;
        }

        /* Mållinje (sjakkrutet) */
        .finish-line {
            position: absolute;
            right: 60px;
            top: 0;
            bottom: 0;
            width: 50px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border-left: 5px solid #e74c3c;
            z-index: 1;
        }

        /* Enkeltbaner for hver bil */
        .lane { 
            position: relative; 
            height: 90px; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
        }

        /* Selve bilen og navnet */
        .car-container { 
            position: absolute; 
            left: 0; 
            transition: left 1.5s cubic-bezier(0.25, 0.1, 0.25, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 10; 
        }

        /* Snur bilen så den kjører mot høyre */
        .car-wrapper {
            animation: engineShake 0.15s infinite;
            font-size: 50px;
            line-height: 1;
            transform: scaleX(-1); 
            display: inline-block;
        }

        @keyframes engineShake {
            0% { transform: scaleX(-1) translate(0, 0); }
            50% { transform: scaleX(-1) translate(0, 1px); }
            100% { transform: scaleX(-1) translate(0, 0); }
        }

        .driver-tag {
            background: #f1c40f;
            color: #000;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 2px solid #000;
        }

        .score-info {
            font-size: 11px;
            color: #ccc;
            margin-top: 2px;
            font-weight: bold;
        }

        /* Oppstart-skjerm */
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .setup-box { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; border: 5px solid #f1c40f; }
        input { padding: 15px; font-size: 24px; width: 200px; text-transform: uppercase; text-align: center; border: 3px solid #34495e; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 24px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <!-- Skjerm for å koble til rom -->
    <div id="setup" class="setup-overlay">
        <div class="setup-box">
            <h1 style="color:#333; margin-bottom:10px;">Ligningsløpet</h1>
            <p style="font-size: 1.2rem;">Skriv inn romkode for å vise klassens løp:</p>
            <input type="text" id="roomInput" placeholder="KODE">
            <br>
            <button onclick="startRace()">START RACET!</button>
        </div>
    </div>

    <div class="header">
        <h1 id="roomTitle">Ligningsløpet</h1>
    </div>

    <div class="track-container">
        <div id="markers" class="markers">
            <span>START</span>
            <span>750</span>
            <span>1500</span>
            <span>2250</span>
            <span>MÅL (3000)</span>
        </div>
        <div class="finish-line"></div>
        <div id="track">
            <!-- Her dukker bilene opp -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase-konfigurasjon (samme som spillet)
        const firebaseConfig = {
            apiKey: "AIzaSyAalM5aIHfhO40O5vlMX8CJSJDUYLzInTs",
            authDomain: "likningsspill.firebaseapp.com",
            databaseURL: "https://likningsspill-default-rtdb.europe-west1.firebasedatabase.app/", 
            projectId: "likningsspill",
            storageBucket: "likningsspill.appspot.com",
            appId: "1:630190192081:web:71968d390422ace3f15cf0"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app, firebaseConfig.databaseURL);

        const carEmojis = ["🏎️", "🏎", "🚗", "🏎️", "🚓", "🏎️", "🏎️"];
        const goalPoints = 3000; // Juster denne for å endre lengden på løpet (30 oppgaver)

        window.startRace = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) return;

            document.getElementById("setup").style.display = "none";
            document.getElementById("roomTitle").innerText = "RACERBANE: " + room;

            const roomRef = ref(database, 'rooms/' + room + '/players');

            // Lytter på endringer i sanntid
            onValue(roomRef, (snapshot) => {
                const players = snapshot.val();
                updateTrack(players);
            });
        };

        function updateTrack(players) {
            const track = document.getElementById("track");
            track.innerHTML = "";
            if (!players) return;

            // Sorterer spillerne så de med flest poeng er øverst i banen
            const sortedEntries = Object.entries(players).sort((a,b) => b[1].score - a[1].score);
            
            sortedEntries.forEach(([name, data]) => {
                const lane = document.createElement("div");
                lane.className = "lane";

                // Beregn posisjon i prosent (0 til 85% for å treffe mållinja)
                const rawProgress = (data.score / goalPoints) * 85; 
                const totalPos = Math.min(rawProgress, 92); 

                // Stabil emoji tildelt per bilnavn
                const emojiIdx = Math.abs(name.split('').reduce((a,b) => a + b.charCodeAt(0), 0)) % carEmojis.length;
                const emoji = carEmojis[emojiIdx];

                lane.innerHTML = `
                    <div class="car-container" style="left: ${totalPos}%">
                        <div class="car-wrapper">${emoji}</div>
                        <div class="driver-tag">${name}</div>
                        <div class="score-info">Poeng: ${data.score} | Lvl ${data.level}</div>
                    </div>
                `;
                track.appendChild(lane);
            });
        }
    </script>
</body>
</html>
