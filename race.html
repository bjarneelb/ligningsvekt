<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Klassisk Bane</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: linear-gradient(to bottom, #333, #1a1a1a); border-bottom: 3px solid #f1c40f; }
        h1 { margin: 0; color: #f1c40f; text-transform: uppercase; letter-spacing: 3px; font-size: 1.8rem; }
        #muteBtn { background: #444; color: white; border: 2px solid #f1c40f; padding: 8px 15px; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .scoreboard-header { width: 98vw; margin: 10px auto 0 auto; display: flex; justify-content: space-between; padding: 5px 110px 5px 60px; box-sizing: border-box; background: rgba(255,255,255,0.05); border-radius: 10px 10px 0 0; color: #f1c40f; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        .track-container { position: relative; width: 98vw; height: 80vh; margin: 0 auto; background: #333; border: 8px solid #555; border-top: none; border-radius: 0 0 20px 20px; box-sizing: border-box; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 100px 100px; }
        .finish-line { position: absolute; right: 60px; top: 0; bottom: 0; width: 50px; background-color: #fff; background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); background-size: 20px 20px; background-position: 0 0, 10px 10px; border-left: 5px solid #e74c3c; z-index: 1; }
        .lane { position: relative; height: 85px; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; }
        .car-container { position: absolute; left: 0; transition: left 1.5s cubic-bezier(0.25, 0.1, 0.25, 1); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .car-wrapper { animation: engineShake 0.15s infinite; font-size: 50px; transform: scaleX(-1); display: inline-block; }
        @keyframes engineShake { 0% { transform: scaleX(-1) translate(0, 0); } 50% { transform: scaleX(-1) translate(0, 1px); } 100% { transform: scaleX(-1) translate(0, 0); } }
        .driver-tag { background: #f1c40f; color: #000; padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-top: 5px; white-space: nowrap; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #000; }
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .setup-box { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; border: 5px solid #f1c40f; width: 400px; }
        .setup-box input { padding: 12px; font-size: 1.2rem; width: 80%; margin: 10px 0; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        button#startBtn { padding: 15px 30px; font-size: 1.5rem; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 10px; margin-top: 20px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="https://bjarneelb.github.io/ligningsvekt/Midnight_Asphalt.mp3" type="audio/mpeg"></audio>

    <div id="setup" class="setup-overlay">
        <div class="setup-box">
            <h1>Ligningsløpet</h1>
            <label><strong>ROMKODE:</strong></label><br>
            <input type="text" id="roomInput" placeholder="F.EKS. MATTE8" style="text-transform: uppercase;"><br>
            <label><strong>POENG FOR Å VINNE:</strong></label><br>
            <input type="number" id="goalInput" value="3000">
            <button id="startBtn" onclick="startRace()">START LØPET!</button>
        </div>
    </div>

    <div class="header">
        <h1 id="roomTitle">Ligningsløpet</h1>
        <button id="muteBtn" onclick="toggleMute()">🔊 LYD PÅ</button>
    </div>

    <div id="scoreboard" class="scoreboard-header">
        <span>START</span>
        <span id="mark1">-</span><span id="mark2">-</span><span id="mark3">-</span>
        <span id="markGoal">MÅL</span>
    </div>

    <div class="track-container">
        <div class="finish-line"></div>
        <div id="track"></div>
    </div>

    <script type="module">
        import { database, ref, onValue } from "./js/firebase-config.js";

        const carEmojis = ["🏎️", "🏎", "🚗", "🚓", "🚐", "🚚"];
        let goalPoints = 3000;
        const music = document.getElementById("bgMusic");

        // HYBRID LOGIKK: Sjekk URL ved oppstart
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            if (room) {
                document.getElementById("roomInput").value = room.toUpperCase();
                startRace();
            }
        };

        window.startRace = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            goalPoints = parseInt(document.getElementById("goalInput").value) || 3000;
            if(!room) return;

            document.getElementById("setup").style.display = "none";
            document.getElementById("roomTitle").innerText = "RACERBANE: " + room;

            document.getElementById("mark1").innerText = Math.round(goalPoints * 0.25);
            document.getElementById("mark2").innerText = Math.round(goalPoints * 0.5);
            document.getElementById("mark3").innerText = Math.round(goalPoints * 0.75);
            document.getElementById("markGoal").innerText = "MÅL (" + goalPoints + ")";

            music.play().catch(() => console.log("Lyd blokkert."));

            const roomRef = ref(database, 'rooms/' + room + '/players');
            onValue(roomRef, (snapshot) => {
                const players = snapshot.val();
                updateTrack(players);
            });
        };

        window.toggleMute = function() {
            music.muted = !music.muted;
            document.getElementById("muteBtn").innerText = music.muted ? "🔇 LYD AV" : "🔊 LYD PÅ";
        };

        function updateTrack(players) {
            const track = document.getElementById("track");
            track.innerHTML = "";
            if (!players) return;

            const now = Date.now();
            const activePlayers = Object.entries(players)
                .filter(([_, d]) => d.lastUpdated && (now - d.lastUpdated < 600000))
                .sort((a,b) => b[1].score - a[1].score);
            
            activePlayers.forEach(([name, data]) => {
                const lane = document.createElement("div");
                lane.className = "lane";
                const progress = Math.min((data.score / goalPoints) * 85, 92); 
                const emojiIdx = Math.abs(name.split('').reduce((a,b) => a + b.charCodeAt(0), 0)) % carEmojis.length;
                
                lane.innerHTML = `<div class="car-container" style="left: ${progress}%">
                    <div class="car-wrapper">${carEmojis[emojiIdx]}</div>
                    <div class="driver-tag">${name}</div>
                    <div style="font-size:10px; font-weight:bold; color:#ccc;">${data.score} P</div>
                </div>`;
                track.appendChild(lane);
            });
        }
    </script>
</body>
</html>
