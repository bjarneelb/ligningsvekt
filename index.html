<!DOCTYPE html>
<html lang="no">
<head>

    <title>Interaktiv Ligningsvekt - Hovedmeny</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: #f0f2f5; 
            margin: 0; 
            color: #333;
        }
        .menu-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.2rem;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-btn {
            display: block;
            padding: 18px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .btn-demo {
            background: #34495e;
        }
        .btn-demo:hover {
            background: #2c3e50;
        }
        .btn-game {
            background: #27ae60;
        }
        .btn-game:hover {
            background: #219150;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;

        <div class="button-group">

            <!-- Lenke til spillmodusen -->

            <!-- Lenke til spillmodusen -->
            <a href="spill_mot_andre.html" class="menu-btn btn-game">🎮 Spill mot andre</a>
