<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Spill</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2c3e50;
            --accent-color: #f1c40f;
            --math-green: #4af626;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* --- STARTSKJERM --- */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .start-box {
            background: white; color: #333; padding: 40px; border-radius: 15px;
            max-width: 500px; text-align: center; border: 5px solid var(--accent-color);
        }
        .instr { font-size: 0.9rem; background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 5px solid var(--panel-color); text-align: left; }
        
        /* --- DASHBORD --- */
        .dashboard {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            grid-template-rows: auto auto;
            gap: 20px;
            width: 95vw;
            max-width: 1100px;
            margin-top: 30px;
            background: #34495e;
            padding: 30px;
            border-radius: 50px 50px 20px 20px;
            border-bottom: 10px solid #222;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Instrumentene */
        .gauge-container {
            grid-column: 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #222;
            padding: 40px 20px;
            border-radius: 100px;
            border: 8px solid #555;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gauge {
            width: 260px; height: 260px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            border: 4px solid #444;
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 5px;
            overflow: hidden; padding: 10px;
        }

        /* Senter-kontroll (Giring/Operasjoner) */
        .center-stack {
            grid-column: 2; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: -20px;
        }
        .gear-box {
            background: #111; border: 3px solid #f1c40f; color: #f1c40f;
            padding: 10px 20px; font-family: monospace; font-size: 2rem; border-radius: 5px;
        }
        .op-unit { background: #444; padding: 15px; border-radius: 10px; border: 2px solid #666; }

        /* Manuelt panel (Utsiden) */
        .side-panel { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; display: none; }

        /* Mattevisning (Displayet) */
        .math-display {
            grid-column: 2; background: #000; color: var(--math-green);
            font-family: monospace; font-size: 1.8rem; padding: 15px;
            border-radius: 8px; text-align: center; border: 2px solid #333; margin-top: 20px;
            box-shadow: inset 0 0 10px #000; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* --- KNAPPER OG ITEMS --- */
        .btn-row { grid-column: 2; display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .item { min-width: 45px; height: 45px; border-radius: 5px; color: white; font-weight: bold; cursor: grab; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
        .box-x { background: #d35400; } .box-x-neg { background: #e74c3c; } .val-pos { background: #2980b9; } .val-neg { background: #c0392b; }
        .btn-action { padding: 10px 25px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-green { background: #27ae60; } .btn-blue { background: #2980b9; } .btn-gray { background: #7f8c8d; }

        .math-frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; padding: 0 4px; font-size: 1.2rem; }
        .math-num { border-bottom: 2px solid var(--math-green); }
        .fraction { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; }
        .numerator { border-bottom: 1px solid white; }
    </style>
</head>
<body>

    <!-- START-SKJERM -->
    <div id="startScreen">
        <div class="start-box">
            <h1>Ligningsløpet</h1>
            <p>Din bil: <strong id="carDisplay" style="color: #e67e22;">...</strong></p>
            <div class="instr">
                <strong>Slik vinner du:</strong> Målet er å løse likningen på dashbordet ved å få <strong>x alene</strong> på det ene instrumentet, og kun et <strong>tall</strong> på det andre.
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="roomInput" placeholder="ROMKODE">
                <select id="startLvl">
                    <option value="0">Tilfeldig nivå</option>
                    <option value="1">Nivå 1: Hele tall</option>
                    <option value="2">Nivå 2: X begge sider</option>
                    <option value="3">Nivå 3: ax+b=cx+d</option>
                    <option value="4">Nivå 4: Brøker</option>
                    <option value="6">Nivå 6: 1/x</option>
                </select>
                <button class="btn-action btn-green" onclick="startGame()">START RACET</button>
            </div>
            <div style="margin-top:15px;">
                <input type="checkbox" id="demoToggle"> <small>Aktiver bygg-selv i dashbordet</small>
            </div>
        </div>
    </div>

    <!-- DASHBORD -->
    <div class="dashboard">
        <!-- Venstre panel -->
        <div id="panelL" class="side-panel">
            <strong>Bygg V</strong>
            <input type="number" id="qtyL" value="1" style="width:40px;">
            <button onclick="addManual('left', 'x')">+X</button>
            <button onclick="addManual('left', 'num')">+1</button>
        </div>

        <div class="center-stack">
            <div class="gear-box" id="gearDisplay">R</div>
            <div class="op-unit">
                <input type="text" id="opVal" value="2" style="width:40px; text-align:center;">
                <button onclick="operate('multiply')">×</button>
                <button onclick="operate('divide')">÷</button>
            </div>
        </div>

        <!-- Høyre panel -->
        <div id="panelR" class="side-panel">
            <strong>Bygg H</strong>
            <input type="number" id="qtyR" value="1" style="width:40px;">
            <button onclick="addManual('right', 'x')">+X</button>
            <button onclick="addManual('right', 'num')">+1</button>
        </div>

        <!-- Instrumentene -->
        <div class="gauge-container" id="dashGauges">
            <div id="gaugeL" class="gauge" ondragover="event.preventDefault()" ondrop="drop(event, 'left')"></div>
            <div id="gaugeR" class="gauge" ondragover="event.preventDefault()" ondrop="drop(event, 'right')"></div>
        </div>

        <div class="math-display" id="mathDisplay">0 = 0</div>

        <div class="btn-row">
            <button class="btn-action btn-gray" onclick="undo()">Angre</button>
            <button class="btn-action btn-blue" onclick="initGame()">Ny</button>
            <button class="btn-action btn-green" onclick="checkSolution()">Sjekk</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAalM5aIHfhO40O5vlMX8CJSJDUYLzInTs",
            authDomain: "likningsspill.firebaseapp.com",
            databaseURL: "https://likningsspill-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "likningsspill",
            appId: "1:630190192081:web:71968d390422ace3f15cf0"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app, firebaseConfig.databaseURL);

        const adj = ["Raske", "Lynraske", "Smarte", "Gylne", "Viltre", "Smidige"];
        const ani = ["Gaupe", "Ulv", "Bjørn", "Oter", "Hauk", "Ugle"];
        const myName = adj[Math.floor(Math.random()*adj.length)] + " " + ani[Math.floor(Math.random()*ani.length)];
        document.getElementById("carDisplay").innerText = myName;

        window.startGame = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) { alert("Skriv inn romkode!"); return; }
            
            const startLvl = parseInt(document.getElementById("startLvl").value);
            if(startLvl > 0) currentLevel = startLvl;
            else currentLevel = Math.floor(Math.random()*3) + 1;

            if(document.getElementById("demoToggle").checked) {
                document.getElementById("panelL").style.display = "block";
                document.getElementById("panelR").style.display = "block";
            }

            document.getElementById("startScreen").style.display = "none";
            
            set(ref(database, 'rooms/'+room+'/players/'+myName), {
                score: 0, level: currentLevel, streak: 0, lastUpdated: Date.now()
            });
            window.roomCode = room;
            initGame();
        };

        window.syncFB = function(lvl, str) {
            if(window.roomCode) {
                update(ref(database, 'rooms/'+window.roomCode+'/players/'+myName), {
                    level: lvl, streak: str, score: str*100, lastUpdated: Date.now()
                });
            }
        };
    </script>

    <script>
        let sides = { left: [], right: [] }, xValue = 0, idCounter = 0, history = [], currentLevel = 1, winStreak = 0;

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function gcd(a, b) { a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b)); while (b) { let t = b; b = a % b; a = t; } return a; }
        function createFraction(num, den) { if (den === 0) return { num: 0, den: 1 }; let g = gcd(num, den); let fN = num / g; let fD = den / g; if (fD < 0) { fN *= -1; fD *= -1; } return { num: fN, den: fD }; }
        
        const levels = {
            1: { generate: () => { let x=getRandomInt(2,9), a=getRandomInt(1,8); xValue=x; sides.left=[{id:idCounter++, type:'x', num:1, den:1}, {id:idCounter++, type:'number', num:a, den:1}]; sides.right=[{id:idCounter++, type:'number', num:x+a, den:1}]; }},
            2: { generate: () => { let x=getRandomInt(2,8), c=getRandomInt(1,4), a=c+1, b=getRandomInt(1,5); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }},
            3: { generate: () => { let x=getRandomInt(2,6), a=getRandomInt(3,5), c=getRandomInt(1,a-2), b=getRandomInt(1,6); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }},
            4: { generate: () => { let den=getRandomInt(2,4), x=den*getRandomInt(1,5); xValue=x; sides.left=[{id:idCounter++, type:'x', num:1, den:den}]; sides.right=[{id:idCounter++, type:'number', num:x/den, den:1}]; }},
            6: { generate: () => { let x=getRandomInt(2,5), m=getRandomInt(1,3); xValue=x; sides.left=[{id:idCounter++, type:'inv-x', num:x*m, den:1}]; sides.right=[{id:idCounter++, type:'number', num:m, den:1}]; }}
        };

        function initGame() {
            sides = { left: [], right: [] }; history = []; idCounter = 0;
            levels[currentLevel].generate();
            render();
        }

        function render() {
            ['left', 'right'].forEach(side => {
                const gauge = document.getElementById('gauge' + (side === 'left' ? 'L' : 'R'));
                gauge.innerHTML = '';
                sides[side].forEach(item => {
                    const div = document.createElement('div');
                    let isNeg = item.num < 0;
                    div.className = 'item ' + (item.type==='x' ? (isNeg?'box-x-neg':'box-x') : (item.type==='inv-x'?'box-inv-x' : (isNeg?'val-neg':'val-pos')));
                    div.draggable = true;
                    div.innerHTML = getBoxHTML(item);
                    div.ondragstart = (e) => e.dataTransfer.setData("text", JSON.stringify({ side, id: item.id }));
                    gauge.appendChild(div);
                });
            });

            // Matte-display
            const display = document.getElementById('mathDisplay');
            display.innerHTML = '';
            display.appendChild(buildMathSide(sides.left));
            const eq = document.createElement('span'); eq.innerText = ' = '; display.appendChild(eq);
            display.appendChild(buildMathSide(sides.right));

            // Vipp instrumentene
            let L = getTotals('left'), R = getTotals('right');
            let diff = (R.xs * xValue + R.units) - (L.xs * xValue + L.units);
            let angle = Math.min(Math.max(diff * 3, -20), 20);
            document.getElementById('dashGauges').style.transform = `rotate(${angle}deg)`;
            document.getElementById('gearDisplay').innerText = currentLevel;
        }

        function getBoxHTML(item) {
            let label = item.type==='x'?'x':'';
            if(item.type==='inv-x') return `<span class="fraction"><span class="numerator">${item.num}</span><span>x</span></span>`;
            if(item.den===1) return (item.num===1 && item.type==='x') ? 'x' : (item.num===-1 && item.type==='x'?'-x':item.num+label);
            let n = (item.num===1 && item.type==='x') ? 'x' : (item.num===-1 && item.type==='x'?'-x':item.num+label);
            return `<span class="fraction"><span class="numerator">${n}</span><span>${item.den}</span></span>`;
        }

        function buildMathSide(items) {
            const container = document.createElement('span');
            if(!items.length) { container.innerText = '0'; return container; }
            items.forEach((item, idx) => {
                if(idx > 0) container.innerHTML += (item.num < 0 ? ' - ' : ' + ');
                else if(item.num < 0) container.innerHTML += '-';
                let absNum = Math.abs(item.num), label = item.type==='x'?'x':'';
                if(item.type==='inv-x') {
                    container.innerHTML += `<span class="math-frac"><span class="math-num">${absNum}</span><span>x</span></span>`;
                } else if(item.den === 1) {
                    container.innerHTML += (absNum===1 && item.type==='x') ? 'x' : absNum+label;
                } else {
                    let n = (absNum===1 && item.type==='x') ? 'x' : absNum+label;
                    container.innerHTML += `<span class="math-frac"><span class="math-num">${n}</span><span>${item.den}</span></span>`;
                }
            });
            return container;
        }

        function getTotals(side) {
            let units = 0, xs = 0;
            sides[side].forEach(i => { let v = i.num/i.den; if(i.type==='x') xs+=v; else if(i.type==='inv-x') xs+=(v*(1/xValue)); else units+=v; });
            return { units, xs };
        }

        function drop(ev, targetSide) {
            ev.preventDefault();
            const data = JSON.parse(ev.dataTransfer.getData("text"));
            saveHistory();
            const idx = sides[data.side].findIndex(i => i.id === data.id);
            const item = sides[data.side].splice(idx, 1)[0];
            sides[targetSide].push(item);
            render();
        }

        function operate(type) {
            const val = parseInt(document.getElementById('opVal').value);
            if(isNaN(val) || val === 0) return;
            saveHistory();
            ['left', 'right'].forEach(s => {
                sides[s] = sides[s].map(i => {
                    let f = type==='multiply' ? createFraction(i.num*val, i.den) : createFraction(i.num, i.den*val);
                    return {...i, num: f.num, den: f.den};
                }).filter(i => i.num !== 0);
            });
            render();
        }

        function checkSolution() {
            let L=getTotals('left'), R=getTotals('right');
            let solved = (sides.left.length === 1 && sides.left[0].type === 'x' && sides.left[0].num === 1 && sides.left[0].den === 1 && sides.right.length === 1 && sides.right[0].type === 'number');
            if(solved && Math.abs(R.units - xValue) < 0.01) {
                alert("Riktig!"); winStreak++;
                if(winStreak >= 6 && currentLevel < 6) { currentLevel++; winStreak = 0; }
                if(window.syncFB) window.syncFB(currentLevel, winStreak);
                initGame();
            } else { alert("Isoler 1x på den ene siden!"); }
        }

        function addManual(side, type) {
            saveHistory();
            const qty = parseInt(document.getElementById('qty' + (side === 'left' ? 'L' : 'R')).value);
            sides[side].push({ id: idCounter++, type: type === 'x' ? 'x' : 'number', num: qty, den: 1 });
            render();
        }

        function saveHistory() { history.push(JSON.stringify({ sides, idCounter })); document.getElementById('undoBtn').disabled = false; }
        function undo() { if(!history.length) return; const s = JSON.parse(history.pop()); sides = s.sides; idCounter = s.idCounter; render(); }

        window.roomCode = null;
        window.onload = () => {}; 
    </script>
</body>
</html>
