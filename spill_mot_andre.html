<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Spill mot andre</title>
    <style>
        :root {
            --car-interior: #1c1c1c;
            --math-green: #4af626;
            --accent: #f1c40f;
            --error-red: #c0392b;
            --highlight-color: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #050b14; color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        .rearview-mirror {
            position: absolute; top: 20px; width: 450px; height: 80px;
            background: #000; border: 6px solid #444; border-radius: 10px 10px 50px 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px var(--math-green);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; border-bottom: 8px solid #222;
        }

        #mirrorText { font-family: monospace; color: var(--math-green); font-size: 1.4rem; text-shadow: 0 0 5px var(--math-green); }

        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .start-box { background: #fff; color: #333; padding: 40px; border-radius: 15px; text-align: center; border: 10px solid #444; width: 350px; }

        .cockpit {
            position: absolute; bottom: 0; width: 100%; height: 75vh;
            background: var(--car-interior); border-top: 15px solid #111;
            border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            display: flex; flex-direction: column; align-items: center; padding-top: 40px;
        }

        .main-dash { display: flex; align-items: center; gap: 20px; margin-top: 20px; }

        .gauge-pod {
            width: 280px; height: 280px; background: #111; border: 10px solid #444; border-radius: 50%;
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 8px;
            position: relative; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .center-console { width: 185px; display: flex; flex-direction: column; align-items: center; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 8px 0 #111; }

        .score-display {
            background: #000; border: 2px solid #444; border-radius: 8px;
            padding: 8px; margin-top: 12px; width: 155px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px rgba(74, 246, 38, 0.2);
        }
        .my-score { color: var(--math-green); font-size: 1rem; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 5px; text-align: center; }
        .top-three { font-size: 0.65rem; color: #888; }
        .is-me { color: var(--accent); font-weight: bold; }

        .car-btn { width: 100%; margin: 3px 0; padding: 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 0.7rem; }
        .btn-check { background: #27ae60; }
        .btn-new { background: #2980b9; }
        .btn-reset { background: var(--error-red); }

        .item { 
            min-width: 48px; height: 48px; border-radius: 8px; color: white; 
            font-weight: bold; cursor: grab; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .box-x { background: #d35400; } .box-x-neg { background: #c0392b; }
        .val-pos { background: #2980b9; } .val-neg { background: #8e44ad; }

        /* NYTT: Highlight-animasjon */
        .highlight {
            animation: pulse-border 4s ease-out;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 4px var(--highlight-color), 0 3px 0 rgba(0,0,0,0.4); transform: scale(1.1); }
            100% { box-shadow: 0 0 0 0px transparent, 0 3px 0 rgba(0,0,0,0.4); transform: scale(1); }
        }

        .context-menu { display: none; position: absolute; background: #333; border: 2px solid #555; color: white; border-radius: 8px; z-index: 2000; overflow: hidden; }
        .context-menu button { display: block; width: 100%; border: none; background: none; color: white; padding: 10px 20px; cursor: pointer; text-align: left; font-weight: bold; }
        .context-menu button:hover { background: #444; color: var(--accent); }
    </style>
</head>
<body>

    <div class="rearview-mirror"><div id="mirrorText">0 = 0</div></div>

    <div id="startScreen">
        <div class="start-box">
            <h1>Ligningsløpet</h1>
            <p>Din bil: <strong id="carDisplay" style="color: #d35400;">...</strong></p>
            <input type="text" id="roomInput" placeholder="ROMKODE" style="padding:10px; text-transform:uppercase; text-align:center; width: 80%;"><br><br>
            <button class="car-btn btn-check" onclick="startGame()">Start Løpet</button>
        </div>
    </div>

    <div id="customMenu" class="context-menu">
        <button onclick="menuInvert()">± Bytt fortegn</button>
        <button onclick="menuSplit()">⚏ Splitt blokk</button>
    </div>

    <div class="cockpit">
        <div class="main-dash">
            <div id="gaugeL" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'left')"></div>
            
            <div class="center-console">
                <div style="color:var(--accent); font-size:1.5rem; font-family:monospace;" id="gearDisplay">1</div>
                <div style="background:#111; padding:3px; border-radius:5px; margin-bottom:5px;">
                    <input type="number" id="opVal" value="2" style="width:40px; text-align:center; background:none; color:white; border:none; font-size:1.2rem;">
                </div>
                <div style="display:flex; gap:3px; width:100%;">
                    <button class="car-btn btn-new" onclick="operate('multiply')">×</button>
                    <button class="car-btn btn-new" onclick="operate('divide')">÷</button>
                </div>
                <button class="car-btn btn-check" onclick="checkSolution()">Sjekk Svar</button>
                <button class="car-btn btn-reset" onclick="resetTask()">Nullstill</button>
                <button class="car-btn" style="background:#555;" onclick="initGame()">Ny Oppgave</button>
                
                <div class="score-display">
                    <div class="my-score">P: <span id="personalScore">0</span></div>
                    <div id="topThreeList" class="top-three"></div>
                </div>
            </div>

            <div id="gaugeR" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'right')"></div>
        </div>
    </div>

    <script type="module">
        import { database, ref, set, update, onValue } from "./js/firebase-config.js";

        const adj = ["Raske", "Lynraske", "Smarte", "Viltre", "Smidige", "Gylne"];
        const ani = ["Gaupe", "Rev", "Bjørn", "Ulv", "Hauk", "Ugle"];
        window.playerName = adj[Math.floor(Math.random()*adj.length)] + " " + ani[Math.floor(Math.random()*ani.length)];
        document.getElementById("carDisplay").innerText = window.playerName;

        window.startGame = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) { alert("Skriv inn romkode!"); return; }
            window.roomCode = room;
            document.getElementById("startScreen").style.display = "none";
            
            set(ref(database, 'rooms/'+room+'/players/'+window.playerName), { 
                score: 0, 
                lastUpdated: Date.now() 
            });

            onValue(ref(database, 'rooms/' + room + '/players'), (snapshot) => {
                const players = snapshot.val();
                if (players) updateDashboard(players);
            });
            initGame();
        };

        window.syncFB = (score) => {
            if(window.roomCode) {
                update(ref(database, 'rooms/'+window.roomCode+'/players/'+window.playerName), { 
                    score: score, lastUpdated: Date.now() 
                });
            }
        };

        function updateDashboard(players) {
            const myData = players[window.playerName];
            if (myData) document.getElementById("personalScore").innerText = myData.score;
            const sorted = Object.entries(players).sort((a, b) => b[1].score - a[1].score).slice(0, 3);
            let html = "";
            sorted.forEach(([name, data], i) => {
                const isMe = (name === window.playerName) ? "is-me" : "";
                html += `<div style="display:flex; justify-content:space-between;" class="${isMe}"><span>${i+1}.${name.split(' ')[1]}</span><span>${data.score}</span></div>`;
            });
            document.getElementById("topThreeList").innerHTML = html;
        }
    </script>

    <script>
        let sides = { left: [], right: [] }, xValue = 0, idCounter = 0, winStreak = 0, activeMenuTarget = null;
        let originalTask = null;
        let lastChangedId = null; // Holder styr på hvilken blokk som sist ble berørt

        function initGame() {
            sides = { left: [], right: [] };
            xValue = Math.floor(Math.random() * 7) + 2; 
            let b = Math.floor(Math.random() * 9) + 1;
            
            lastChangedId = null; // Nullstill ved ny oppgave
            originalTask = {
                left: [{id: idCounter++, type: 'x', num: 1}, {id: idCounter++, type: 'num', num: b}],
                right: [{id: idCounter++, type: 'num', num: xValue + b}],
                x: xValue
            };
            resetTask();
        }

        window.resetTask = function() {
            if(!originalTask) return;
            sides.left = JSON.parse(JSON.stringify(originalTask.left));
            sides.right = JSON.parse(JSON.stringify(originalTask.right));
            xValue = originalTask.x;
            lastChangedId = null;
            render();
        };

        function render() {
            ['left', 'right'].forEach(side => {
                const gauge = document.getElementById('gauge' + (side === 'left' ? 'L' : 'R'));
                gauge.innerHTML = '';
                sides[side].forEach(item => {
                    const div = document.createElement('div');
                    // Legger til 'highlight' klasse hvis id-en matcher
                    const isHighlighted = item.id === lastChangedId ? 'highlight' : '';
                    div.className = `item ${item.type === 'x' ? (item.num < 0 ? 'box-x-neg' : 'box-x') : (item.num < 0 ? 'val-neg' : 'val-pos')} ${isHighlighted}`;
                    
                    div.draggable = true;
                    div.setAttribute('data-id', item.id);
                    div.innerText = (item.type === 'x') ? (item.num === 1 ? "X" : item.num === -1 ? "-X" : item.num + "X") : item.num;
                    
                    div.addEventListener('dragstart', (e) => e.dataTransfer.setData("text", JSON.stringify({ side, id: item.id })));
                    div.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        activeMenuTarget = { side, item };
                        const menu = document.getElementById('customMenu');
                        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    });
                    gauge.appendChild(div);
                });
            });

            const getW = (s) => sides[s].reduce((t, i) => t + (i.type === 'x' ? i.num * xValue : i.num), 0);
            const diff = getW('left') - getW('right');
            const moveY = Math.min(Math.max(diff * 5, -50), 50);
            document.getElementById('gaugeL').style.transform = `translateY(${-moveY}px)`;
            document.getElementById('gaugeR').style.transform = `translateY(${moveY}px)`;
            document.getElementById('mirrorText').innerText = formatSide(sides.left) + " = " + formatSide(sides.right);
        }

        function formatSide(items) {
            if (items.length === 0) return "0";
            return items.map((i, idx) => {
                let term = (i.type === 'x') ? (i.num === 1 ? "x" : i.num === -1 ? "-x" : i.num + "x") : i.num;
                return (idx > 0 && i.num >= 0) ? "+ " + term : term;
            }).join(" ");
        }

        window.handleDrop = function(ev, targetSide) {
            ev.preventDefault();
            const data = JSON.parse(ev.dataTransfer.getData("text"));
            const item = sides[data.side].find(i => i.id === data.id);
            if(!item) return;

            lastChangedId = item.id; // Merk denne som endret

            const targetEl = ev.target.closest('.item');
            if (targetEl && data.side === targetSide) {
                const targetItem = sides[targetSide].find(i => i.id === parseInt(targetEl.getAttribute('data-id')));
                if (targetItem && targetItem.type === item.type && targetItem.id !== item.id) {
                    targetItem.num += item.num;
                    lastChangedId = targetItem.id; // Slått sammen -> uthev mottakeren
                    sides[data.side].splice(sides[data.side].indexOf(item), 1);
                    if (targetItem.num === 0) {
                        sides[targetSide].splice(sides[targetSide].indexOf(targetItem), 1);
                        lastChangedId = null;
                    }
                    render(); return;
                }
            }
            sides[targetSide].push(sides[data.side].splice(sides[data.side].indexOf(item), 1)[0]);
            render();
        };

        window.checkSolution = function() {
            const L = sides.left, R = sides.right;
            if (L.length === 1 && L[0].type === 'x' && L[0].num === 1 && R.length === 1 && R[0].type === 'num' && R[0].num === xValue) {
                alert("Riktig!"); winStreak++;
                if (window.syncFB) window.syncFB(winStreak * 100);
                initGame();
            } else { alert("Ikke løst korrekt ennå!"); }
        };

        window.operate = function(t) {
            const v = parseInt(document.getElementById('opVal').value);
            if (!v) return;
            lastChangedId = null; // Operasjoner påvirker alle, fjerner individuell highlight
            ['left', 'right'].forEach(s => {
                sides[s].forEach(i => { if (t === 'multiply') i.num *= v; else i.num = Math.round(i.num / v); });
                sides[s] = sides[s].filter(i => i.num !== 0);
            });
            render();
        };

        window.menuInvert = function() { 
            if(activeMenuTarget) { 
                activeMenuTarget.item.num *= -1; 
                lastChangedId = activeMenuTarget.item.id; 
                render(); 
            } 
        };
        
        window.menuSplit = function() {
            if(!activeMenuTarget || Math.abs(activeMenuTarget.item.num) < 2) return;
            const i = activeMenuTarget.item, n1 = Math.floor(i.num/2), n2 = i.num - n1;
            const sideArr = sides[activeMenuTarget.side];
            sideArr.splice(sideArr.indexOf(i), 1);
            // Legger til to nye med nye ID-er, uthever den ene
            const newId = idCounter++;
            sideArr.push({id: newId, type: i.type, num: n1}, {id: idCounter++, type: i.type, num: n2});
            lastChangedId = newId; 
            render();
        };

        document.addEventListener('click', () => document.getElementById('customMenu').style.display = 'none');
        window.onload = initGame;
    </script>
</body>
</html>
