<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Full Versjon</title>
    <style>
        :root {
            --car-interior: #1c1c1c;
            --math-green: #4af626;
            --accent: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #050b14; color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        .rearview-mirror {
            position: absolute; top: 20px; width: 450px; height: 80px;
            background: #000; border: 6px solid #444; border-radius: 10px 10px 50px 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px var(--math-green);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; border-bottom: 8px solid #222;
        }

        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .start-box { background: #fff; color: #333; padding: 40px; border-radius: 15px; text-align: center; }

        .cockpit {
            position: absolute; bottom: 0; width: 100%; height: 75vh;
            background: var(--car-interior); border-top: 15px solid #111;
            border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            display: flex; flex-direction: column; align-items: center; padding-top: 40px;
        }

        .main-dash { display: flex; align-items: center; gap: 20px; margin-top: 20px; }

        .gauge-pod {
            width: 280px; height: 280px; background: #111; border: 10px solid #444; border-radius: 50%;
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 8px;
            position: relative; transition: transform 0.6s; overflow: hidden;
        }

        .center-console { width: 160px; display: flex; flex-direction: column; align-items: center; background: #222; padding: 15px; border-radius: 20px; }

        .car-btn { width: 100%; margin: 3px 0; padding: 8px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-check { background: #27ae60; }
        .btn-new { background: #2980b9; }

        .item { 
            min-width: 45px; height: 45px; border-radius: 6px; color: white; 
            font-weight: bold; cursor: grab; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4);
        }
        .box-x { background: #d35400; } .box-x-neg { background: #c0392b; }
        .val-pos { background: #2980b9; } .val-neg { background: #8e44ad; }

        .context-menu { display: none; position: absolute; background: #333; border: 1px solid #555; color: white; border-radius: 5px; z-index: 2000; }
        .context-menu button { display: block; width: 100%; border: none; background: none; color: white; padding: 8px 15px; cursor: pointer; text-align: left; }
        
        #mirrorText { font-family: monospace; color: var(--math-green); font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="rearview-mirror"><div id="mirrorText">0 = 0</div></div>

    <div id="startScreen">
        <div class="start-box">
            <h1>Ligningsløpet</h1>
            <p>Din bil: <strong id="carDisplay">...</strong></p>
            <input type="text" id="roomInput" placeholder="ROMKODE"><br><br>
            <button class="car-btn btn-check" onclick="startGame()">Start Løpet</button>
        </div>
    </div>

    <div id="customMenu" class="context-menu">
        <button onclick="menuInvert()">± Bytt fortegn</button>
        <button onclick="menuSplit()">⚏ Splitt opp</button>
    </div>

    <div class="cockpit">
        <div class="main-dash">
            <div id="gaugeL" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'left')"></div>
            <div class="center-console">
                <div style="color:var(--accent); font-size:1.5rem; margin-bottom:10px;" id="gearDisplay">1</div>
                <input type="number" id="opVal" value="2" style="width:40px; text-align:center; margin-bottom:5px;">
                <button class="car-btn btn-new" onclick="operate('multiply')">×</button>
                <button class="car-btn btn-new" onclick="operate('divide')">÷</button>
                <button class="car-btn btn-check" onclick="checkSolution()">Sjekk</button>
                <button class="car-btn btn-new" onclick="initGame()">Ny oppgave</button>
            </div>
            <div id="gaugeR" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'right')"></div>
        </div>
    </div>

    <script type="module">
        import { database, ref, set, update } from "./js/firebase-config.js";

        const adj = ["Raske", "Lynraske", "Smarte", "Viltre", "Smidige", "Gylne"];
        const ani = ["Gaupe", "Rev", "Bjørn", "Ulv", "Hauk", "Ugle"];
        window.playerName = adj[Math.floor(Math.random()*adj.length)] + " " + ani[Math.floor(Math.random()*ani.length)];
        document.getElementById("carDisplay").innerText = window.playerName;

        window.startGame = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) return;
            window.roomCode = room;
            document.getElementById("startScreen").style.display = "none";
            set(ref(database, 'rooms/'+room+'/players/'+window.playerName), { score: 0, lastUpdated: Date.now() });
            initGame();
        };

        window.syncFB = (score) => {
            if(window.roomCode) update(ref(database, 'rooms/'+window.roomCode+'/players/'+window.playerName), { score: score, lastUpdated: Date.now() });
        };
    </script>

    <script>
        let sides = { left: [], right: [] }, xValue = 0, idCounter = 0, currentLevel = 1, winStreak = 0, activeMenuTarget = null;

        function initGame() {
            sides = { left: [], right: [] };
            xValue = Math.floor(Math.random() * 8) + 2;
            let a = Math.floor(Math.random() * 5) + 1;
            let b = Math.floor(Math.random() * 10) + 1;
            
            // Nivå 1: x + b = c
            sides.left = [{id:idCounter++, type:'x', num:1}, {id:idCounter++, type:'num', num:b}];
            sides.right = [{id:idCounter++, type:'num', num:xValue + b}];
            render();
        }

        function render() {
            ['left', 'right'].forEach(side => {
                const gauge = document.getElementById('gauge' + (side === 'left' ? 'L' : 'R'));
                gauge.innerHTML = '';
                sides[side].forEach(item => {
                    const div = document.createElement('div');
                    div.className = `item ${item.type === 'x' ? (item.num < 0 ? 'box-x-neg' : 'box-x') : (item.num < 0 ? 'val-neg' : 'val-pos')}`;
                    div.draggable = true;
                    div.innerText = (item.num === 1 && item.type === 'x') ? 'X' : (item.num === -1 && item.type === 'x') ? '-X' : item.num + (item.type === 'x' ? 'X' : '');
                    
                    div.addEventListener('dragstart', (e) => e.dataTransfer.setData("text", JSON.stringify({ side, id: item.id })));
                    div.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        activeMenuTarget = { side, item };
                        const menu = document.getElementById('customMenu');
                        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    });
                    gauge.appendChild(div);
                });
            });

            // Oppdater bakspeilet
            document.getElementById('mirrorText').innerText = formatSide(sides.left) + " = " + formatSide(sides.right);
        }

        function formatSide(items) {
            if (items.length === 0) return "0";
            return items.map((i, idx) => {
                let term = (i.num === 1 && i.type === 'x') ? 'x' : (i.num === -1 && i.type === 'x') ? '-x' : i.num + (i.type === 'x' ? 'x' : '');
                return (idx > 0 && i.num >= 0) ? "+ " + term : term;
            }).join(" ");
        }

        window.handleDrop = function(ev, targetSide) {
            ev.preventDefault();
            const data = JSON.parse(ev.dataTransfer.getData("text"));
            const sourceIdx = sides[data.side].findIndex(i => i.id === data.id);
            const item = sides[data.side][sourceIdx];

            // Sjekk om vi slipper på en annen blokk for å slå sammen
            const targetEl = ev.target.closest('.item');
            if (targetEl && data.side === targetSide) {
                const targetId = parseInt(targetEl.getAttribute('data-id')); // Denne krever at vi setter data-id i render
                // For enkelthets skyld i denne koden, sjekker vi type-matching:
                const targetItem = sides[targetSide].find(i => i.type === item.type && i.id !== item.id);
                if (targetItem) {
                    targetItem.num += item.num;
                    sides[data.side].splice(sourceIdx, 1);
                    if (targetItem.num === 0) sides[targetSide].splice(sides[targetSide].indexOf(targetItem), 1);
                    render(); return;
                }
            }
            
            // Vanlig flytting mellom sider
            sides[targetSide].push(sides[data.side].splice(sourceIdx, 1)[0]);
            render();
        };

        window.checkSolution = function() {
            const L = sides.left, R = sides.right;
            if (L.length === 1 && L[0].type === 'x' && L[0].num === 1 && R.length === 1 && R[0].type === 'num' && R[0].num === xValue) {
                alert("Riktig!"); winStreak++;
                if (window.syncFB) window.syncFB(winStreak * 100);
                initGame();
            } else { alert("Ikke helt i mål! Isoler 1X på venstre side."); }
        };

        window.operate = function(type) {
            const val = parseInt(document.getElementById('opVal').value);
            ['left', 'right'].forEach(s => {
                sides[s].forEach(i => {
                    if (type === 'multiply') i.num *= val;
                    else i.num /= val;
                });
            });
            render();
        };

        window.menuInvert = function() { if(activeMenuTarget) { activeMenuTarget.item.num *= -1; render(); } };
        window.menuSplit = function() {
            if(!activeMenuTarget || Math.abs(activeMenuTarget.item.num) < 2) return;
            let i = activeMenuTarget.item;
            let n1 = Math.floor(i.num / 2), n2 = i.num - n1;
            sides[activeMenuTarget.side].splice(sides[activeMenuTarget.side].indexOf(i), 1);
            sides[activeMenuTarget.side].push({id:idCounter++, type:i.type, num:n1}, {id:idCounter++, type:i.type, num:n2});
            render();
        };

        document.addEventListener('click', () => document.getElementById('customMenu').style.display = 'none');
        window.onload = initGame;
    </script>
</body>
</html>
