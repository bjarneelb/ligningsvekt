<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Sportsbil Edition</title>
    <style>
        :root {
            --car-interior: #1c1c1c;
            --leather: #2c3e50;
            --stitch: #e74c3c;
            --math-green: #4af626;
            --chrome: linear-gradient(145deg, #e6e6e6, #999);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #050b14; /* Nattehimmel utenfor vinduet */
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        /* --- FRONTRETE / BAKGRUNN --- */
        .windshield {
            position: fixed; top: 0; width: 100%; height: 50vh;
            background: linear-gradient(to bottom, #050b14 0%, #1a2a6c 100%);
            z-index: -1;
        }

        /* --- BAKSPEIL --- */
        .rearview-mirror {
            position: absolute; top: 20px; width: 450px; height: 80px;
            background: #000; border: 6px solid #444; border-radius: 10px 10px 50px 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px var(--math-green);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; border-bottom: 8px solid #222;
        }

        /* --- STARTSKJERM --- */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .start-box {
            background: #fff; color: #333; padding: 40px; border-radius: 15px;
            text-align: center; border: 10px solid #444; box-shadow: 0 0 50px #000;
        }

        /* --- COCKPIT / DASHBORD --- */
        .cockpit {
            position: absolute; bottom: 0; width: 100%; height: 75vh;
            background: var(--car-interior);
            border-top: 15px solid #111;
            border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 40px;
            background-image: radial-gradient(#333 10%, transparent 11%);
            background-size: 5px 5px; /* Karbonfiber-effekt */
        }

        .main-dash {
            display: flex; align-items: flex-end; gap: 30px; margin-top: 20px;
        }

        /* Instrumentene (Turtellere) */
        .gauge-pod {
            width: 320px; height: 320px;
            background: #111; border: 10px solid #444; border-radius: 50%;
            box-shadow: 0 10px 0 #222, inset 0 0 20px rgba(0,0,0,0.8);
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 8px;
            position: relative; transition: transform 0.4s ease-out;
        }
        .gauge-pod::after {
            content: ""; position: absolute; inset: -5px; border-radius: 50%;
            border: 2px solid var(--stitch); opacity: 0.5;
        }

        /* Midtkonsoll */
        .center-console {
            width: 280px; display: flex; flex-direction: column; align-items: center;
            background: #222; padding: 20px; border-radius: 20px;
            border: 3px solid #333; box-shadow: 0 15px 0 #111;
        }

        .gear-indicator {
            background: #000; color: #f1c40f; padding: 10px 25px;
            font-family: 'Orbitron', monospace; font-size: 2.5rem;
            border-radius: 5px; border: 2px solid #444; margin-bottom: 20px;
            text-shadow: 0 0 10px #f1c40f;
        }

        /* --- KNAPPER --- */
        .car-btn {
            width: 100%; margin: 5px 0; padding: 12px;
            border-radius: 5px; border: none; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 0 #000; transition: 0.1s;
        }
        .car-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .btn-check { background: #27ae60; color: white; }
        .btn-new { background: #2980b9; color: white; }
        .btn-undo { background: #7f8c8d; color: white; }

        /* Byggepanel integrert */
        .manual-side { 
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; 
            font-size: 0.8rem; border-top: 2px solid var(--stitch); display: none;
        }

        /* --- ITEMS --- */
        .item { 
            min-width: 55px; height: 55px; border-radius: 8px; color: white; 
            font-weight: bold; cursor: grab; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 0.9rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
        }
        .box-x { background: #d35400; } .box-x-neg { background: #c0392b; }
        .val-pos { background: #2980b9; } .val-neg { background: #8e44ad; }
        
        .fraction { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; font-size: 0.8rem; }
        .numerator { border-bottom: 1px solid white; width: 100%; text-align: center; }

        #mirrorText { font-family: monospace; color: var(--math-green); font-size: 1.5rem; text-shadow: 0 0 5px var(--math-green); }

        .context-menu { display: none; position: absolute; background: #333; border: 1px solid #555; color: white; border-radius: 5px; z-index: 2000; }
        .context-menu button { display: block; width: 100%; border: none; background: none; color: white; padding: 10px; cursor: pointer; text-align: left; }
        .context-menu button:hover { background: #444; }
    </style>
</head>
<body>

    <div class="windshield"></div>

    <div class="rearview-mirror">
        <div id="mirrorText">0 = 0</div>
    </div>

    <div id="startScreen">
        <div class="start-box">
            <h1 style="margin-top:0">Ligningsløpet</h1>
            <p>Din bil: <strong id="carDisplay" style="color: #e67e22;">...</strong></p>
            <div style="background:#eee; padding:15px; border-radius:10px; margin:20px 0; font-size:0.9rem;">
                <strong>Oppdrag:</strong> Få vektene i balanse ved å isolere 1x på det ene instrumentet.
            </div>
            <input type="text" id="roomInput" placeholder="ROMKODE" style="padding:10px; width:200px; text-transform:uppercase;"><br><br>
            <button class="car-btn btn-check" onclick="startGame()" style="width:220px">Kjør i gang!</button>
            <div style="margin-top:10px;"><input type="checkbox" id="demoToggle"> <small>Vis byggepaneler</small></div>
        </div>
    </div>

    <div id="customMenu" class="context-menu">
        <button onclick="menuInvert()">± Bytt fortegn</button>
        <button onclick="menuSplit()">⚏ Splitt opp</button>
    </div>

    <div class="cockpit">
        <div class="main-dash" id="dashFrame">
            <!-- Venstre Panel -->
            <div id="panelL" class="manual-side">
                <strong>V</strong><br>
                <input type="number" id="qtyL" value="1" style="width:35px; background:#000; color:#fff; border:1px solid #555;">
                <button onclick="addManual('left','x')">+X</button>
                <button onclick="addManual('left','num')">+1</button>
            </div>

            <div id="gaugeL" class="gauge-pod" ondragover="event.preventDefault()" ondrop="drop(event, 'left')"></div>

            <!-- Midtkonsoll -->
            <div class="center-console">
                <div class="gear-indicator" id="gearDisplay">1</div>
                
                <div style="background:#111; padding:10px; border-radius:5px; border:1px solid #444; margin-bottom:15px;">
                    <input type="text" id="opVal" value="2" style="width:40px; text-align:center; background:#000; color:#fff; border:none; font-size:1.2rem;">
                    <button class="car-btn btn-new" style="width:40px; padding:5px;" onclick="operate('multiply')">×</button>
                    <button class="car-btn btn-new" style="width:40px; padding:5px;" onclick="operate('divide')">÷</button>
                </div>

                <button class="car-btn btn-check" onclick="checkSolution()">Sjekk</button>
                <button class="car-btn btn-undo" onclick="undo()">Angre</button>
                <button class="car-btn btn-new" onclick="initGame()">Ny</button>
            </div>

            <div id="gaugeR" class="gauge-pod" ondragover="event.preventDefault()" ondrop="drop(event, 'right')"></div>

            <!-- Høyre Panel -->
            <div id="panelR" class="manual-side">
                <strong>H</strong><br>
                <input type="number" id="qtyR" value="1" style="width:35px; background:#000; color:#fff; border:1px solid #555;">
                <button onclick="addManual('right','x')">+X</button>
                <button onclick="addManual('right','num')">+1</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAalM5aIHfhO40O5vlMX8CJSJDUYLzInTs",
            authDomain: "likningsspill.firebaseapp.com",
            databaseURL: "https://likningsspill-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "likningsspill",
            appId: "1:630190192081:web:71968d390422ace3f15cf0"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app, firebaseConfig.databaseURL);

        const adj = ["Raske", "Lynraske", "Smarte", "Viltre", "Smidige", "Gylne"];
        const ani = ["Gaupe", "Rev", "Bjørn", "Ulv", "Hauk", "Ugle"];
        const myName = adj[Math.floor(Math.random()*adj.length)] + " " + ani[Math.floor(Math.random()*ani.length)];
        document.getElementById("carDisplay").innerText = myName;

        window.startGame = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) { alert("Skriv inn romkode!"); return; }
            if(document.getElementById("demoToggle").checked) {
                document.getElementById("panelL").style.display = "block";
                document.getElementById("panelR").style.display = "block";
            }
            document.getElementById("startScreen").style.display = "none";
            window.roomCode = room;
            set(ref(database, 'rooms/'+room+'/players/'+myName), { score: 0, level: 1, streak: 0, lastUpdated: Date.now() });
            initGame();
        };

        window.syncFB = (lvl, str) => {
            if(window.roomCode) update(ref(database, 'rooms/'+window.roomCode+'/players/'+myName), { level: lvl, streak: str, score: str*100, lastUpdated: Date.now() });
        };
    </script>

    <script>
        let sides = { left: [], right: [] }, xValue = 0, idCounter = 0, history = [], currentLevel = 1, winStreak = 0, activeMenuTarget = null;

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function gcd(a, b) { a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b)); while (b) { let t = b; b = a % b; a = t; } return a; }
        function createFraction(num, den) { if (den === 0) return { num: 0, den: 1 }; let g = gcd(num, den); let fN = num / g; let fD = den / g; if (fD < 0) { fN *= -1; fD *= -1; } return { num: fN, den: fD }; }

        const levels = {
            1: { generate: () => { let x=getRandomInt(2,9), a=getRandomInt(1,8); xValue=x; sides.left=[{id:idCounter++, type:'x', num:1, den:1}, {id:idCounter++, type:'number', num:a, den:1}]; sides.right=[{id:idCounter++, type:'number', num:x+a, den:1}]; }},
            2: { generate: () => { let x=getRandomInt(2,8), c=getRandomInt(1,4), a=c+1, b=getRandomInt(1,5); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }},
            3: { generate: () => { let x=getRandomInt(2,6), a=getRandomInt(3,5), c=getRandomInt(1,a-2), b=getRandomInt(1,6); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }},
            4: { generate: () => { let den=getRandomInt(2,4), x=den*getRandomInt(1,5); xValue=x; sides.left=[{id:idCounter++, type:'x', num:1, den:den}]; sides.right=[{id:idCounter++, type:'number', num:x/den, den:1}]; }},
            6: { generate: () => { let x=getRandomInt(2,5), m=getRandomInt(1,3); xValue=x; sides.left=[{id:idCounter++, type:'inv-x', num:x*m, den:1}]; sides.right=[{id:idCounter++, type:'number', num:m, den:1}]; }}
        };

        function initGame() {
            sides = { left: [], right: [] }; history = []; idCounter = 0;
            const lvl = levels[currentLevel] || levels[1];
            lvl.generate(); render();
        }

        function render() {
            ['left', 'right'].forEach(side => {
                const gauge = document.getElementById('gauge' + (side === 'left' ? 'L' : 'R'));
                gauge.innerHTML = '';
                sides[side].forEach(item => {
                    const div = document.createElement('div');
                    let isNeg = item.num < 0;
                    div.className = 'item ' + (item.type==='x' ? (isNeg?'box-x-neg':'box-x') : (item.type==='inv-x'?'box-inv-x' : (isNeg?'val-neg':'val-pos')));
                    div.draggable = true; div.setAttribute('data-id', item.id);
                    div.innerHTML = getBoxHTML(item);
                    div.ondragstart = (e) => e.dataTransfer.setData("text", JSON.stringify({ side, id: item.id }));
                    div.oncontextmenu = (e) => {
                        e.preventDefault(); activeMenuTarget = { side, item };
                        const menu = document.getElementById('customMenu');
                        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    };
                    gauge.appendChild(div);
                });
            });

            const mirror = document.getElementById('mirrorText');
            mirror.innerHTML = '';
            mirror.appendChild(buildMathSide(sides.left));
            mirror.innerHTML += ' = ';
            mirror.appendChild(buildMathSide(sides.right));

            let L = getTotals('left'), R = getTotals('right');
            let diff = (R.xs * xValue + R.units) - (L.xs * xValue + L.units);
            let angle = Math.min(Math.max(diff * 3, -15), 15);
            document.getElementById('dashFrame').style.transform = `rotate(${angle}deg)`;
            document.getElementById('gearDisplay').innerText = currentLevel;
        }

        function getBoxHTML(item) {
            let label = item.type==='x'?'x':'';
            if(item.type==='inv-x') return `<span class="fraction"><span class="numerator">${item.num}</span><span>x</span></span>`;
            if(item.den===1) return (item.num===1 && item.type==='x') ? 'x' : (item.num===-1 && item.type==='x'?'-x':item.num+label);
            let n = (item.num===1 && item.type==='x') ? 'x' : (item.num===-1 && item.type==='x'?'-x':item.num+label);
            return `<span class="fraction"><span class="numerator">${n}</span><span>${item.den}</span></span>`;
        }

        function buildMathSide(items) {
            const container = document.createElement('span');
            if(!items.length) { container.innerText = '0'; return container; }
            items.forEach((item, idx) => {
                if(idx > 0) container.innerHTML += (item.num < 0 ? ' - ' : ' + ');
                else if(item.num < 0) container.innerHTML += '-';
                let absNum = Math.abs(item.num), label = item.type==='x'?'x':'';
                if(item.type==='inv-x') {
                    container.innerHTML += `<span class="math-frac"><span class="math-num">${absNum}</span><span>x</span></span>`;
                } else if(item.den === 1) {
                    container.innerHTML += (absNum===1 && item.type==='x') ? 'x' : absNum+label;
                } else {
                    let n = (absNum===1 && item.type==='x') ? 'x' : absNum+label;
                    container.innerHTML += `<span class="math-frac"><span class="math-num">${n}</span><span>${item.den}</span></span>`;
                }
            });
            return container;
        }

        function getTotals(side) {
            let u = 0, x = 0;
            sides[side].forEach(i => { let v = i.num/i.den; if(i.type==='x') x+=v; else if(i.type==='inv-x') x+=(v*(1/xValue)); else u+=v; });
            return { units: u, xs: x };
        }

        function drop(ev, targetSide) {
            ev.preventDefault();
            const data = JSON.parse(ev.dataTransfer.getData("text"));
            const sourceSide = data.side;
            const sourceIdx = sides[sourceSide].findIndex(i => i.id === data.id);
            if(sourceIdx === -1) return;
            const item = sides[sourceSide][sourceIdx];

            const targetEl = ev.target.closest('.item');
            if(targetEl && sourceSide === targetSide) {
                const targetId = parseInt(targetEl.getAttribute('data-id'));
                const targetItem = sides[targetSide].find(i => i.id === targetId);
                if(item.type === targetItem.type && item.id !== targetId) {
                    saveHistory();
                    let f = createFraction((targetItem.num * item.den) + (item.num * targetItem.den), targetItem.den * item.den);
                    targetItem.num = f.num; targetItem.den = f.den;
                    sides[sourceSide].splice(sourceIdx, 1);
                    if(targetItem.num === 0) sides[targetSide].splice(sides[targetSide].indexOf(targetItem), 1);
                    render(); return;
                }
            }
            saveHistory();
            sides[targetSide].push(sides[sourceSide].splice(sourceIdx, 1)[0]);
            render();
        }

        function operate(type) {
            const val = parseInt(document.getElementById('opVal').value);
            if(isNaN(val) || val === 0) return;
            saveHistory();
            ['left', 'right'].forEach(s => {
                sides[s] = sides[s].map(i => {
                    let f = type==='multiply' ? createFraction(i.num*val, i.den) : createFraction(i.num, i.den*val);
                    return {...i, num: f.num, den: f.den};
                }).filter(i => i.num !== 0);
            });
            render();
        }

        function checkSolution() {
            let L=getTotals('left'), R=getTotals('right');
            const solved = (sides.left.length === 1 && sides.left[0].type === 'x' && sides.left[0].num === 1 && sides.left[0].den === 1 && sides.right.length === 1 && sides.right[0].type === 'number');
            if(solved && Math.abs(R.units - xValue) < 0.01) {
                alert("Bra kjørt!"); winStreak++;
                if(winStreak >= 6 && currentLevel < 6) { currentLevel++; winStreak = 0; }
                if(window.syncFB) window.syncFB(currentLevel, winStreak);
                initGame();
            } else { alert("Du må isolere 1x på venstre side for å få grønt lys!"); }
        }

        function addManual(side, type) {
            saveHistory();
            const qty = parseInt(document.getElementById('qty' + (side === 'left' ? 'L' : 'R')).value);
            sides[side].push({ id: idCounter++, type: type === 'x' ? 'x' : 'number', num: qty, den: 1 });
            render();
        }

        function saveHistory() { history.push(JSON.stringify({ sides: JSON.parse(JSON.stringify(sides)), idCounter })); }
        function undo() { if(!history.length) return; const s = JSON.parse(history.pop()); sides = s.sides; idCounter = s.idCounter; render(); }
        function menuInvert() { if(!activeMenuTarget) return; saveHistory(); activeMenuTarget.item.num *= -1; render(); }
        function menuSplit() { if(!activeMenuTarget) return; saveHistory(); let i = activeMenuTarget.item; let p1 = Math.ceil(i.num/2), p2 = i.num - p1; sides[activeMenuTarget.side].splice(sides[activeMenuTarget.side].indexOf(i), 1); sides[activeMenuTarget.side].push({id: idCounter++, type: i.type, num: p1, den: i.den}, {id: idCounter++, type: i.type, num: p2, den: i.den}); render(); }
        document.addEventListener('click', () => document.getElementById('customMenu').style.display = 'none');
    </script>
</body>
</html>
