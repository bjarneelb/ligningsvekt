<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Ligningsløpet - Matte-oppgaver</title>
    <style>
        :root {
            --car-interior: #1c1c1c;
            --leather: #2c3e50;
            --stitch: #e74c3c;
            --math-green: #4af626;
            --accent: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #050b14; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        .windshield {
            position: fixed; top: 0; width: 100%; height: 50vh;
            background: linear-gradient(to bottom, #050b14 0%, #1a2a6c 100%);
            z-index: -1;
        }

        .rearview-mirror {
            position: absolute; top: 20px; width: 450px; height: 80px;
            background: #000; border: 6px solid #444; border-radius: 10px 10px 50px 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 15px var(--math-green);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; border-bottom: 8px solid #222;
        }

        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .start-box {
            background: #fff; color: #333; padding: 40px; border-radius: 15px;
            text-align: center; border: 10px solid #444; max-width: 400px;
        }

        .cockpit {
            position: absolute; bottom: 0; width: 100%; height: 75vh;
            background: var(--car-interior);
            border-top: 15px solid #111;
            border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 40px;
            background-image: radial-gradient(#333 10%, transparent 11%);
            background-size: 5px 5px;
        }

        .main-dash {
            display: flex; align-items: center; gap: 20px; margin-top: 20px;
            height: 400px;
        }

        .gauge-pod {
            width: 280px; height: 280px;
            background: #111; border: 10px solid #444; border-radius: 50%;
            box-shadow: 0 10px 0 #000, inset 0 0 20px rgba(0,0,0,0.8);
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 8px;
            position: relative; 
            transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            overflow: hidden;
        }

        .center-console {
            width: 160px; display: flex; flex-direction: column; align-items: center;
            background: #222; padding: 15px; border-radius: 20px;
            border: 3px solid #333; box-shadow: 0 8px 0 #111;
            z-index: 5;
        }

        .gear-indicator {
            background: #000; color: var(--accent); padding: 5px 15px;
            font-size: 1.8rem; border-radius: 5px; border: 2px solid #444; margin-bottom: 15px;
            font-family: monospace;
        }

        .car-btn {
            width: 100%; margin: 3px 0; padding: 8px;
            border-radius: 4px; border: none; font-weight: bold;
            text-transform: uppercase; cursor: pointer; color: white;
            box-shadow: 0 3px 0 rgba(0,0,0,0.5); font-size: 0.8rem;
        }
        .btn-check { background: #27ae60; }
        .btn-new { background: #2980b9; }
        .btn-undo { background: #7f8c8d; }
        .btn-home { background: #e74c3c; margin-top: 8px; text-decoration: none; display: block; text-align: center; font-size: 0.7rem; }

        .manual-side { 
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; 
            display: none; width: 110px; border: 1px solid #444; text-align: center;
        }
        .manual-side input { width: 35px; background: #000; color: #fff; border: 1px solid #555; text-align: center; margin-bottom: 5px; }
        .manual-side button { padding: 4px 8px; font-size: 0.75rem; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 3px; width: 100%; margin-top: 2px; }

        .item { 
            min-width: 45px; height: 45px; border-radius: 6px; color: white; 
            font-weight: bold; cursor: grab; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 0.8rem;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
            transition: transform 0.2s;
        }
        
        .box-x { background: #d35400; } 
        .box-x-neg { background: #c0392b; }
        .val-pos { background: #2980b9; } 
        .val-neg { background: #8e44ad; }
        
        .math-frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; padding: 0 4px; font-size: 1.1rem; }
        .math-num { border-bottom: 2px solid var(--math-green); width: 100%; text-align: center; }
        
        #mirrorText { font-family: monospace; color: var(--math-green); font-size: 1.4rem; text-shadow: 0 0 5px var(--math-green); }

        .fraction { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; }
        .numerator { border-bottom: 1px solid white; padding-bottom: 1px; }
    </style>
</head>
<body>

    <div class="windshield"></div>
    <div class="rearview-mirror"><div id="mirrorText">0 = 0</div></div>

    <div id="startScreen">
        <div class="start-box">
            <h1>Ligningsløpet</h1>
            <p>Din bil: <strong id="carDisplay" style="color: #e67e22;">...</strong></p>
            <input type="text" id="roomInput" placeholder="ROMKODE" style="padding:10px; width:180px; text-transform:uppercase; margin-bottom:10px;"><br>
            
            <select id="levelSelect" style="padding:10px; width:200px; margin-bottom:15px;">
                <option value="random">Tilfeldig nivå</option>
                <option value="1">Nivå 1: Hele tall</option>
                <option value="2">Nivå 2: X begge sider</option>
                <option value="3">Nivå 3: Flere ledd</option>
                <option value="4">Nivå 4: Brøker</option>
            </select><br>

            <button class="car-btn btn-check" onclick="startGame()" style="width:200px">Start Løpet</button>
            <div style="margin-top:10px;"><input type="checkbox" id="demoToggle"> <small>Vis byggepaneler</small></div>
        </div>
    </div>

    <div class="cockpit">
        <div class="main-dash">
            <div id="panelL" class="manual-side">
                <strong>VENSTRE</strong>
                <input type="number" id="qtyL" value="1">
                <button onclick="addManual('left','x')">+ X</button>
                <button onclick="addManual('left','num')">+ Tall</button>
            </div>

            <div id="gaugeL" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'left')"></div>

            <div class="center-console">
                <div class="gear-indicator" id="gearDisplay">1</div>
                
                <div style="background:#111; padding:8px; border-radius:5px; border:1px solid #444; margin-bottom:8px; display:flex; gap:3px;">
                    <input type="text" id="opVal" value="2" style="width:30px; text-align:center; background:#000; color:#fff; border:none; font-size:1rem;">
                    <button class="car-btn btn-new" style="width:30px; padding:2px;" onclick="operate('multiply')">×</button>
                    <button class="car-btn btn-new" style="width:30px; padding:2px;" onclick="operate('divide')">÷</button>
                </div>
                
                <button class="car-btn btn-check" onclick="checkSolution()">Sjekk</button>
                <button class="car-btn btn-undo" onclick="undo()">Angre</button>
                <button class="car-btn btn-new" onclick="initGame()">Ny</button>
                <a href="index.html" class="car-btn btn-home">Hjem</a>
            </div>

            <div id="gaugeR" class="gauge-pod" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'right')"></div>

            <div id="panelR" class="manual-side">
                <strong>HØYRE</strong>
                <input type="number" id="qtyR" value="1">
                <button onclick="addManual('right','x')">+ X</button>
                <button onclick="addManual('right','num')">+ Tall</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { database, ref, set, update } from "./js/firebase-config.js";

        // Global Navne-generering
        const adj = ["Raske", "Lynraske", "Smarte", "Viltre", "Smidige", "Gylne"];
        const ani = ["Gaupe", "Rev", "Bjørn", "Ulv", "Hauk", "Ugle"];
        window.playerName = adj[Math.floor(Math.random()*adj.length)] + " " + ani[Math.floor(Math.random()*ani.length)];
        document.getElementById("carDisplay").innerText = window.playerName;

        window.startGame = function() {
            const room = document.getElementById("roomInput").value.trim().toUpperCase();
            if(!room) { alert("Skriv inn romkode!"); return; }
            
            const lvlPick = document.getElementById("levelSelect").value;
            if(lvlPick === "random") currentLevel = Math.floor(Math.random()*3)+1;
            else currentLevel = parseInt(lvlPick);

            if(document.getElementById("demoToggle").checked) {
                document.querySelectorAll('.manual-side').forEach(el => el.style.display = 'block');
            }
            document.getElementById("startScreen").style.display = "none";
            window.roomCode = room;

            // Viktig: Bruker window.playerName
            set(ref(database, 'rooms/'+room+'/players/'+window.playerName), { 
                score: 0, 
                level: currentLevel, 
                streak: 0, 
                lastUpdated: Date.now() 
            });
            initGame();
        };

        window.syncFB = (lvl, str) => {
            if(window.roomCode) {
                update(ref(database, 'rooms/'+window.roomCode+'/players/'+window.playerName), { 
                    level: lvl, 
                    streak: str, 
                    score: str * 100, 
                    lastUpdated: Date.now() 
                });
            }
        };
    </script>

    <script>
        // Logikken for selve spillet
        let sides = { left: [], right: [] }, xValue = 0, idCounter = 0, history = [], currentLevel = 1, winStreak = 0;

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function gcd(a, b) { a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b)); while (b) { let t = b; b = a % b; a = t; } return a; }
        function createFraction(num, den) { 
            let g = gcd(num, den); 
            let fN = num / g; let fD = den / g; 
            if (fD < 0) { fN *= -1; fD *= -1; } 
            return { num: fN, den: fD }; 
        }

        const levels = {
            1: { generate: () => { let x=getRandomInt(2,9), a=getRandomInt(1,8); xValue=x; sides.left=[{id:idCounter++, type:'x', num:1, den:1}, {id:idCounter++, type:'number', num:a, den:1}]; sides.right=[{id:idCounter++, type:'number', num:x+a, den:1}]; }},
            2: { generate: () => { let x=getRandomInt(2,8), c=getRandomInt(1,4), a=c+1, b=getRandomInt(1,5); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }},
            3: { generate: () => { let x=getRandomInt(2,6), a=getRandomInt(3,5), c=getRandomInt(1,a-2), b=getRandomInt(1,6); xValue=x; sides.left=[{id:idCounter++, type:'x', num:a, den:1}, {id:idCounter++, type:'number', num:b, den:1}]; sides.right=[{id:idCounter++, type:'x', num:c, den:1}, {id:idCounter++, type:'number', num:(a*x+b)-(c*x), den:1}]; }}
        };

        function initGame() {
            sides = { left: [], right: [] }; history = []; idCounter = 0;
            const lvl = levels[currentLevel] || levels[1];
            lvl.generate(); render();
        }

        function render() {
            ['left', 'right'].forEach(side => {
                const gauge = document.getElementById('gauge' + (side === 'left' ? 'L' : 'R'));
                gauge.innerHTML = '';
                sides[side].forEach(item => {
                    const div = document.createElement('div');
                    let isNeg = item.num < 0;
                    div.className = 'item ' + (item.type==='x' ? (isNeg?'box-x-neg':'box-x') : (isNeg?'val-neg':'val-pos'));
                    div.draggable = true; 
                    div.innerHTML = getBoxHTML(item);
                    div.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData("text", JSON.stringify({ side, id: item.id }));
                    });
                    gauge.appendChild(div);
                });
            });

            const mirror = document.getElementById('mirrorText');
            mirror.innerText = "Likning generert"; // Forenklet for render
            document.getElementById('gearDisplay').innerText = currentLevel;
        }

        function getBoxHTML(item) {
            let label = item.type==='x'?'x':'';
            if(item.den===1) return (item.num===1 && item.type==='x') ? 'x' : item.num+label;
            return `<span class="fraction"><span class="numerator">${item.num}${label}</span><span>${item.den}</span></span>`;
        }

        window.handleDrop = function(ev, targetSide) {
            ev.preventDefault();
            const data = JSON.parse(ev.dataTransfer.getData("text"));
            const sourceIdx = sides[data.side].findIndex(i => i.id === data.id);
            if(sourceIdx === -1) return;
            saveHistory();
            sides[targetSide].push(sides[data.side].splice(sourceIdx, 1)[0]);
            render();
        };

        window.checkSolution = function() {
            let L=sides.left, R=sides.right;
            const solved = (L.length === 1 && L[0].type === 'x' && L[0].num === 1 && R.length === 1 && R[0].type === 'number');
            if(solved && Math.abs((R[0].num/R[0].den) - xValue) < 0.01) {
                alert("Målpassering!"); winStreak++;
                if(window.syncFB) window.syncFB(currentLevel, winStreak);
                initGame();
            } else { alert("Isoler 1x på venstre side!"); }
        };

        function saveHistory() { history.push(JSON.stringify(sides)); }
        window.undo = function() { if(history.length) { sides = JSON.parse(history.pop()); render(); } };
        window.initGame = initGame;
        window.addManual = function(side, type) {
            saveHistory();
            const qty = parseInt(document.getElementById('qty' + (side === 'left' ? 'L' : 'R')).value);
            sides[side].push({ id: idCounter++, type: type === 'x' ? 'x' : 'number', num: qty, den: 1 });
            render();
        };
    </script>
</body>
</html>
